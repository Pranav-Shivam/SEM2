<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DM4ML — Revision Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* ============ SHARED HUB THEME TOKENS ============ */
:root{
  color-scheme: dark;
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow-soft: 0 18px 48px rgba(8, 15, 28, 0.14);
  --shadow-lift: 0 24px 60px rgba(7, 16, 34, 0.24);
  --page-bg:
    radial-gradient(circle at top left, rgba(71, 164, 255, 0.18), transparent 28%),
    radial-gradient(circle at 85% 12%, rgba(255, 181, 86, 0.16), transparent 22%),
    linear-gradient(180deg, #07111f 0%, #0b1625 42%, #0e1b2d 100%);
  --surface: rgba(11, 20, 34, 0.78);
  --surface-strong: rgba(15, 26, 43, 0.96);
  --surface-soft: rgba(255, 255, 255, 0.05);
  --surface-muted: rgba(151, 170, 199, 0.12);
  --card-bg: rgba(13, 24, 40, 0.88);
  --border: rgba(160, 184, 218, 0.16);
  --border-strong: rgba(186, 205, 232, 0.28);
  --text: #edf4ff;
  --text-muted: #afbed4;
  --text-faint: #7e90ab;
  --accent: #ffb556;
  --accent-2: #60c0ff;
  --accent-3: #8ce7c2;
  --accent-4: #cb9cff;
  --success-bg: rgba(140, 231, 194, 0.14);
  --success-text: #b9f6dd;
  --tab-idle: rgba(255, 255, 255, 0.05);
  --input-bg: rgba(255, 255, 255, 0.05);
  --chip-bg: rgba(255, 255, 255, 0.07);
  --hero-outline: linear-gradient(135deg, rgba(255, 181, 86, 0.42), rgba(96, 192, 255, 0.25), rgba(203, 156, 255, 0.26));
  --grid-line: rgba(255, 255, 255, 0.05);

  /* ---- Page-specific tokens, re-pointed at the shared palette above ----
     DM4ML subject accent = --accent-3 (teal), matching this console's
     original teal identity. Fonts/mono kept as this page's own choices
     (dense data/code console), per theme-spec's "don't fight an existing
     font choice that's core to the page's identity" allowance. */
  --bg:var(--page-bg);
  --panel:var(--surface-strong);
  --panel2:var(--surface-muted);
  --panel3:var(--chip-bg);
  --border-soft:var(--border);
  --muted:var(--text-muted);
  --muted2:var(--text-faint);
  --accent:var(--accent-3);
  --accent-dim:var(--success-bg);
  --amber:#f0a857;
  --amber-dim:rgba(240,168,87,0.12);
  --red:#ef6f6f;
  --red-dim:rgba(239,111,111,0.1);
  --blue:var(--accent-2);
  --blue-dim:rgba(111,168,245,0.1);
  --radius:10px;
  --font-display:'Space Grotesk',sans-serif;
  --font-ui:'Inter',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}

html[data-theme="light"]{
  color-scheme: light;
  --page-bg:
    radial-gradient(circle at top left, rgba(122, 187, 255, 0.25), transparent 28%),
    radial-gradient(circle at 88% 12%, rgba(255, 192, 100, 0.28), transparent 24%),
    linear-gradient(180deg, #f5f8fc 0%, #ecf3fb 50%, #e7eef7 100%);
  --surface: rgba(255, 255, 255, 0.78);
  --surface-strong: rgba(255, 255, 255, 0.92);
  --surface-soft: rgba(18, 42, 68, 0.05);
  --surface-muted: rgba(38, 76, 124, 0.08);
  --card-bg: rgba(255, 255, 255, 0.88);
  --border: rgba(48, 82, 130, 0.14);
  --border-strong: rgba(45, 80, 128, 0.24);
  --text: #10233e;
  --text-muted: #4f6686;
  --text-faint: #7185a3;
  --accent: #de8d22;
  --accent-2: #2483db;
  --accent-3: #128868;
  --accent-4: #8750df;
  --success-bg: rgba(18, 136, 104, 0.1);
  --success-text: #0c7258;
  --tab-idle: rgba(19, 43, 73, 0.05);
  --input-bg: rgba(19, 43, 73, 0.05);
  --chip-bg: rgba(19, 43, 73, 0.07);
  --hero-outline: linear-gradient(135deg, rgba(222, 141, 34, 0.32), rgba(36, 131, 219, 0.22), rgba(135, 80, 223, 0.2));
  --grid-line: rgba(27, 48, 79, 0.06);
  --shadow-soft: 0 18px 42px rgba(31, 64, 105, 0.10);
  --shadow-lift: 0 24px 54px rgba(31, 64, 105, 0.14);
}
*{box-sizing:border-box;}
html,body{margin:0; padding:0; min-width:0;}
body{
  background:var(--bg); color:var(--text); font-family:var(--font-body);
  line-height:1.55; -webkit-font-smoothing:antialiased; overflow-wrap:break-word;
}
::selection{background:var(--accent-dim); color:var(--accent);}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--panel3); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

a{color:var(--blue);}
strong{color:#fff; font-weight:600;}
code{font-family:var(--font-mono); background:var(--panel3); padding:1px 6px; border-radius:5px; font-size:.85em; color:var(--accent);}

/* ============ APP SHELL ============ */
.app{
  display:grid; grid-template-columns:248px minmax(0,1fr); grid-template-rows:auto minmax(0,1fr);
  height:100dvh; min-height:0; overflow:hidden;
}

/* ---- Header ---- */
header{
  grid-column:1 / -1; display:flex; align-items:center; gap:16px; min-width:0;
  padding:14px max(22px, env(safe-area-inset-right)) 14px max(22px, env(safe-area-inset-left));
  border-bottom:1px solid var(--border); background:var(--panel);
  z-index:30;
}
.brand{display:flex; align-items:center; gap:10px; flex:0 0 auto;}
.brand .mark{
  width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--accent),#1a9879);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700;
  color:#04140f; font-size:13px; flex:0 0 auto;
}
.brand .name{font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:.01em;}
.brand .name span{color:var(--muted); font-weight:500; font-size:12px; display:block; margin-top:-2px; letter-spacing:.02em;}

.search-wrap{flex:1; max-width:420px; position:relative;}
.search-wrap input{
  width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text);
  padding:9px 14px 9px 36px; border-radius:8px; font-size:13.5px; font-family:var(--font-body);
  outline:none; transition:border-color .15s, background .15s;
}
.search-wrap input:focus{border-color:var(--accent); background:var(--panel3);}
.search-wrap input::placeholder{color:var(--muted2);}
.search-wrap .icon{
  position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted2);
  font-size:14px; pointer-events:none;
}
.search-wrap kbd{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  font-family:var(--font-mono); font-size:10px; color:var(--muted2);
  background:var(--panel3); border:1px solid var(--border); border-radius:4px; padding:2px 5px;
}

.global-progress{flex:0 0 auto; display:flex; align-items:center; gap:10px; margin-left:auto;}
.global-progress .label{font-size:11px; color:var(--muted); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.06em;}
.global-progress .ring{width:34px; height:34px; position:relative;}
.global-progress .ring svg{transform:rotate(-90deg);}
.global-progress .ring .pct{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:9px; color:var(--accent); font-weight:600;
}

/* ---- Hub back-link + theme toggle (shared across the study hub) ---- */
.hub-controls{
  display:flex; align-items:center; gap:8px; flex:0 0 auto; margin-left:12px; padding-left:12px;
  border-left:1px solid var(--border);
}
.hub-back,.hub-theme-toggle{
  display:flex; align-items:center; gap:6px; font-family:var(--font-body); font-size:12px; font-weight:600;
  color:var(--muted); background:var(--panel2); border:1px solid var(--border); border-radius:999px;
  padding:7px 12px; cursor:pointer; transition:all .15s; white-space:nowrap; text-decoration:none;
  box-shadow:var(--shadow-soft);
}
.hub-back:hover,.hub-theme-toggle:hover{color:var(--accent); border-color:var(--accent);}
.hub-theme-toggle svg{flex:0 0 auto;}
@media(max-width:760px){
  .hub-controls{margin-left:0; padding-left:0; border-left:none; order:4; flex:1 0 100%; justify-content:flex-end;}
}

/* ---- Desktop vertical navigation ---- */
.tab-rail{
  display:flex; flex-direction:column; gap:4px; width:100%; height:100%; min-height:0;
  padding:14px 10px; background:var(--panel); border-right:1px solid var(--border);
  overflow-x:hidden; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--panel3) transparent;
  overscroll-behavior-y:contain; position:relative;
}
.tab-rail::-webkit-scrollbar{display:block; width:8px;}
.tab{
  flex:0 0 auto; display:flex; align-items:center; gap:10px; width:100%; min-height:44px; padding:9px 11px;
  border-radius:8px; cursor:pointer; border:1px solid transparent; background:transparent;
  transition:background .15s, border-color .15s; user-select:none; position:relative;
}
.tab:hover{background:var(--panel2);}
.tab.active{background:var(--panel2); border-color:var(--border);}
.tab .tab-ring{width:22px; height:22px; flex:0 0 auto; position:relative;}
.tab .tab-ring svg{transform:rotate(-90deg);}
.tab .tab-id{font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--muted);}
.tab.active .tab-id{color:var(--accent);}
.tab .tab-name{min-width:0; font-size:12.5px; line-height:1.35; color:var(--muted);}
.tab.active .tab-name{color:var(--text); font-weight:500;}
.tab-divider{width:auto; height:1px; background:var(--border); margin:6px 4px; flex:0 0 auto;}

/* The scrollbar remains visible so long session lists are discoverable. */
.rail-wrap{grid-column:1; grid-row:2; min-width:0; min-height:0; overflow:hidden;}
.rail-fade{
  display:none;
}

/* ---- Compact session switcher (replaces sidebar under 900px) ---- */
.mobile-switcher{display:none;}
.mobile-switcher-trigger{
  width:100%; display:flex; align-items:center; gap:10px; padding:12px 16px;
  background:var(--panel); border:none; border-bottom:1px solid var(--border);
  color:var(--text); font-family:var(--font-body); cursor:pointer; text-align:left;
}
.mobile-switcher-trigger .msq-ring{flex:0 0 auto; width:24px; height:24px;}
.mobile-switcher-trigger .msq-ring svg{transform:rotate(-90deg);}
.mobile-switcher-trigger .msq-label{flex:1; font-size:14px; font-weight:600;}
.mobile-switcher-trigger .msq-label small{display:block; font-size:10.5px; color:var(--muted); font-weight:400; margin-top:1px;}
.mobile-switcher-trigger .msq-chevron{color:var(--muted2); font-size:13px; transform:rotate(90deg);}

.sheet-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:90; opacity:0; pointer-events:none;
  transition:opacity .2s;
}
.sheet-backdrop.show{opacity:1; pointer-events:auto;}
.sheet{
  position:fixed; left:0; right:0; bottom:0; background:var(--panel); z-index:95;
  border-radius:18px 18px 0 0; border-top:1px solid var(--border);
  transform:translateY(100%); transition:transform .25s ease; max-height:75vh; overflow-y:auto;
  padding:8px 0 max(16px, env(safe-area-inset-bottom));
}
.sheet.show{transform:translateY(0);}
.sheet-handle{width:36px; height:4px; background:var(--border); border-radius:4px; margin:8px auto 6px;}
.sheet-title{font-family:var(--font-display); font-size:13px; color:var(--muted); padding:6px 18px 10px; text-transform:uppercase; letter-spacing:.06em;}
.sheet-item{
  display:flex; align-items:center; gap:12px; padding:13px 18px; cursor:pointer;
  border-bottom:1px solid var(--border-soft);
}
.sheet-item:last-child{border-bottom:none;}
.sheet-item:active{background:var(--panel2);}
.sheet-item.active{background:var(--accent-dim);}
.sheet-item .si-ring{flex:0 0 auto; width:26px; height:26px;}
.sheet-item .si-ring svg{transform:rotate(-90deg);}
.sheet-item .si-icon{flex:0 0 auto; font-size:16px; width:26px; text-align:center;}
.sheet-item .si-text{flex:1;}
.sheet-item .si-name{font-size:14px; font-weight:600; color:var(--text);}
.sheet-item .si-meta{font-size:11px; color:var(--muted); margin-top:1px;}
.sheet-item.active .si-name{color:var(--accent);}
.sheet-divider{height:8px;}

/* ---- Main content area ---- */
main{
  grid-column:2; grid-row:2; min-height:0; min-width:0; overflow-y:auto; overflow-x:hidden;
  padding:26px 0 max(80px, calc(48px + env(safe-area-inset-bottom)));
  scroll-behavior:smooth; overscroll-behavior-y:contain;
}
.content-inner{width:100%; max-width:880px; min-width:0; margin:0 auto; padding:0 28px;}

.session-head{margin-bottom:22px;}
.session-head .eyebrow{
  font-family:var(--font-mono); font-size:11px; color:var(--accent); text-transform:uppercase;
  letter-spacing:.08em; margin-bottom:6px; display:flex; align-items:center; gap:8px;
}
.session-head h1{font-family:var(--font-display); font-size:25px; margin:0 0 6px; font-weight:700;}
.session-head .desc{color:var(--muted); font-size:13.5px; margin:0;}
.session-tools{display:flex; gap:8px; margin-top:14px;}
.btn-sm{
  font-family:var(--font-body); font-size:12px; padding:6px 12px; border-radius:7px;
  border:1px solid var(--border); background:var(--panel2); color:var(--muted); cursor:pointer;
  transition:all .15s; display:flex; align-items:center; gap:5px;
}
.btn-sm:hover{border-color:var(--accent); color:var(--accent);}

/* ---- Accordion Cards ---- */
.card-list{display:flex; flex-direction:column; gap:8px;}
.card{
  background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; transition:border-color .15s;
}
.card.open{border-color:var(--border-soft); background:var(--panel);}
.card-head{
  display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer;
  user-select:none;
}
.card-head:hover .card-title{color:var(--accent);}
.checkbox{
  width:19px; height:19px; border-radius:6px; border:1.5px solid var(--muted2); flex:0 0 auto;
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s;
  background:var(--panel2);
}
.checkbox.checked{background:var(--accent); border-color:var(--accent);}
.checkbox svg{width:11px; height:11px; opacity:0; transition:opacity .1s;}
.checkbox.checked svg{opacity:1;}
.card-title{
  flex:1; min-width:0; font-family:var(--font-display); font-size:14.5px; font-weight:600;
  color:var(--text); transition:color .15s;
}
.card.done .card-title{color:var(--muted);}
.card-tags{display:flex; gap:5px; flex:0 0 auto;}
.mini-tag{
  font-size:9.5px; font-family:var(--font-mono); padding:2px 6px; border-radius:4px;
  text-transform:uppercase; letter-spacing:.04em;
}
.mini-tag.trap{background:var(--red-dim); color:var(--red);}
.mini-tag.high{background:var(--amber-dim); color:var(--amber);}
.chevron{color:var(--muted2); transition:transform .2s; flex:0 0 auto;}
.card.open .chevron{transform:rotate(90deg); color:var(--accent);}

.card-body{
  max-height:0; overflow:hidden; transition:max-height .25s ease;
}
.card-body-inner{padding:0 16px 18px 47px; font-size:13.5px;}
.card-body-inner p{margin:6px 0;}
.card-body-inner ul,.card-body-inner ol{margin:6px 0 10px; padding-left:20px;}
.card-body-inner li{margin-bottom:5px;}

table.mini{
  display:block; width:100%; max-width:100%; border-collapse:collapse; margin:10px 0;
  font-size:12.5px; overflow-x:auto; overscroll-behavior-x:contain;
  -webkit-overflow-scrolling:touch;
}
table.mini th,table.mini td{padding:6px 9px; border:1px solid var(--border); text-align:left; vertical-align:top;}
table.mini th{background:var(--panel2); color:var(--amber); font-weight:600; font-size:11.5px;}
table.mini tr:nth-child(even) td{background:rgba(255,255,255,0.012);}

.callout{border-radius:8px; padding:11px 13px; margin:10px 0; font-size:13px; border-left:3px solid;}
.callout.trap{background:var(--red-dim); border-color:var(--red);}
.callout.trap .ctitle{color:var(--red);}
.callout.tip{background:var(--accent-dim); border-color:var(--accent);}
.callout.tip .ctitle{color:var(--accent);}
.callout.def{background:var(--blue-dim); border-color:var(--blue);}
.callout.def .ctitle{color:var(--blue);}
.ctitle{font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; display:block;}

.flow-mini{display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin:10px 0; font-family:var(--font-mono); font-size:12px;}
.flow-mini .node{background:var(--panel3); border:1px solid var(--border); padding:5px 10px; border-radius:6px;}
.flow-mini .arrow{color:var(--accent);}

.mnemonic{font-family:var(--font-mono); color:var(--amber); letter-spacing:.03em;}

/* ---- Cheatsheet grid view ---- */
.cheat-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
@media(max-width:700px){.cheat-grid{grid-template-columns:1fr;}}
.cheat-card{
  background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
}
.cheat-card h4{margin:0 0 8px; font-family:var(--font-display); font-size:13px; color:var(--amber); display:flex; align-items:center; gap:6px;}
.cheat-card ul{margin:0; padding-left:17px; font-size:12.8px;}
.cheat-card li{margin-bottom:5px;}
.jump-pill{font-size:9.5px; font-family:var(--font-mono); color:var(--muted2); background:var(--panel2); padding:1px 6px; border-radius:10px; margin-left:auto; cursor:pointer; border:1px solid var(--border);}
.jump-pill:hover{color:var(--accent); border-color:var(--accent);}

/* ---- Glossary ---- */
.glossary-search{margin-bottom:14px;}
.glossary-search input{
  width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text);
  padding:10px 14px; border-radius:8px; font-size:13.5px; outline:none;
}
.glossary-search input:focus{border-color:var(--accent);}
.gloss-grid{display:grid; grid-template-columns:1fr; gap:6px;}
.gloss-item{
  display:flex; gap:14px; padding:10px 14px; background:var(--panel); border:1px solid var(--border);
  border-radius:8px; font-size:13px;
}
.gloss-term{font-family:var(--font-mono); color:var(--accent); font-weight:600; flex:0 0 150px;}
.gloss-def{color:var(--muted); flex:1;}
.gloss-item.hidden{display:none;}

/* ---- Empty search state ---- */
.empty-state{text-align:center; padding:60px 20px; color:var(--muted);}
.empty-state .big{font-size:32px; margin-bottom:10px;}

/* ---- Search results overlay ---- */
.search-results{
  position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--panel2);
  border:1px solid var(--border); border-radius:10px; max-height:380px; overflow-y:auto;
  box-shadow:0 12px 30px rgba(0,0,0,0.5); z-index:50; display:none;
}
.search-results.show{display:block;}
.sr-item{padding:10px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s;}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:var(--panel3);}
.sr-item .sr-session{font-family:var(--font-mono); font-size:10px; color:var(--accent); text-transform:uppercase; margin-bottom:2px;}
.sr-item .sr-title{font-size:13px; font-weight:600; color:var(--text);}
.sr-item .sr-snippet{font-size:11.5px; color:var(--muted); margin-top:2px;}
.sr-empty{padding:16px; text-align:center; color:var(--muted); font-size:13px;}
mark{background:var(--amber-dim); color:var(--amber); padding:0 2px; border-radius:2px;}

/* ---- Tablet ---- */
@media(max-width:980px){
  header{gap:12px;}
  .brand .name span{display:none;}
  .search-wrap{max-width:none;}
  .global-progress .label{display:none;}
  .content-inner{max-width:820px; padding-inline:22px;}
}

@media(max-width:900px){
  .app{display:flex; flex-direction:column;}
  .rail-wrap{display:none;}
  .mobile-switcher{display:block; flex:0 0 auto;}
  main{flex:1; min-height:0;}
}

/* ---- Mobile ---- */
@media(max-width:760px){
  header{
    flex-wrap:wrap; padding:10px max(14px, env(safe-area-inset-right)) 10px max(14px, env(safe-area-inset-left));
    gap:9px 10px;
  }
  .brand .name{font-size:14px;}
  .brand .name span{display:none;}
  .search-wrap{order:3; flex:1 0 100%; width:100%; max-width:none;}
  .search-wrap input{min-height:44px; padding-block:10px; font-size:16px;}
  .search-wrap kbd{display:none;}
  .search-results{max-height:min(52dvh,380px);}

<script>
/* ============================================================
   DATA MODEL — all sessions, cards, callouts
   ============================================================ */
const STORAGE_KEY = 'dm4ml_progress_v1';

// Helper builders so card content stays readable below

const callout = (type, title, body) => `<div class="callout ${type}"><span class="ctitle">${title}</span>${body}</div>`;
const flow = (...nodes) => '<div class="flow-mini">' + nodes.map((n,i)=> (i>0?'<span class="arrow">→</span>':'') + `<span class="node">${n}</span>`).join('') + '</div>';

const SESSIONS = [
{
  id:'cheatsheet', kind:'cheatsheet', tabName:'Cheat Sheet', icon:'🔥',

  desc:'Every exam trap and key fact across all 8 sessions, grouped by theme. Start here if time is short.',

    {h:'DIKW & Foundations', items:[
      'DIKW = Data → Information → Knowledge → Wisdom. Each level <strong>filters noise</strong> from the one below.',
      '<strong>TAVI</strong> = Text, Audio, Video, Image — the 4 unstructured modalities.',
      '<strong>GIGO</strong>: bad input data permanently degrades ML output, regardless of model quality.',

    ]},
    {h:'5 Data Models', items:[

      '<strong>Hierarchical</strong> (NoSQL) — tree, one parent only. Registry, XML.',
      '<strong>Graph</strong> (NoSQL) — nodes+edges, Cypher/Gremlin.',

    {h:'Normalization', items:[

      '1NF=atomic · 2NF=full PK dependency · 3NF=no transitive dependency · BCNF=every determinant is a candidate key.',
      'Invented by <strong>Edgar Codd</strong>, 1970.'
    ]},
    {h:'Row vs Column Storage', items:[
      '<strong>Row-major</strong> = CSV, OLTP, fast writes.',
      '<strong>Column-major</strong> = Parquet, OLAP, fast reads — wins for ML feature columns.'

    {h:'ETL vs ELT', items:[
      'ETL = transform <em>before</em> load → Warehouse, schema-on-write.',
      'ELT = load raw <em>then</em> transform → Lake, schema-on-read.',

      '<strong>Reverse ETL</strong> = warehouse → back into Salesforce/HubSpot.'

    {h:'Warehouse / Lake / Lakehouse', items:[

      'Lakehouse = Lake + ACID via Delta Lake / Iceberg / Hudi.',
      'Data Mart = department-scoped subset of a warehouse.'
    ]},
    {h:'Lambda vs Kappa', items:[
      'Lambda = batch (cold) + speed (hot) + serving. Two codebases = pain.',
      'Kappa (Jay Kreps) = single stream, replay log for "batch."',
      '<strong>Exam trick:</strong> cricket live broadcast = Kappa. Highlights reel = Lambda batch path.'
    ]},
    {h:'CDC — Change Data Capture', items:[
      '4 mechanisms: Triggers, <strong>Transaction Log</strong> (gold standard), Stored Procedures, Message Queues.',
      'Incremental <code>WHERE updated_at &gt; checkpoint</code> misses hard deletes — CDC catches them.'
    ]},
    {h:'HDFS', items:[
      'NameNode = metadata only (RAM). DataNode = actual blocks.',
      'Secondary NameNode ≠ backup — merges edit logs.',
      'Block size 128MB. Replication factor 3 → survive ~33% cluster loss.'
    ]},
    {h:'CRISP-DM (6 Stages)', items:[
      'Business Understanding → Data Understanding → Prep → Modeling → Evaluation → Deployment. <strong>Iterative.</strong>',
      'Data Prep = 60–80% of project time.',
      'Modeling = technical fit. Evaluation = business value fit.'
    ]},
    {h:'Confusion Matrix', items:[
      'Type I = False Positive ("I falsely accuse"). Type II = False Negative ("missed it").',
      '<strong>Accuracy lies on imbalanced data</strong> — always check class balance first.'
    ]},
    {h:'Drift Types', items:[
      '<strong>Data drift</strong>: P(X) changes. <strong>Concept drift</strong>: P(Y|X) changes.',
      '<strong>Training-serving skew</strong>: feature computed differently train vs serve — fix with a feature store.'
    ]},
    {h:'Drift Detection Metrics', items:[
      '<strong>PSI</strong>: &lt;0.1 stable · 0.1–0.25 investigate · ≥0.25 act.',
      '<strong>KL Divergence</strong>: asymmetric, undefined at Q(x)=0. JS Divergence = symmetric fix.'
    ]},
    {h:'Pre-processing Order', items:[
      '<span class="mnemonic">Impute → Outliers → Dedupe → Conform → Split → Normalize</span>',

    {h:'Data Leakage — 3 Causes', items:[

    {h:'10 Data Quality Dimensions', items:[
      'Accuracy, Completeness, Consistency, Timeliness, Validity, Uniqueness, Integrity, Lineage, Reliability, Accessibility.',

    ]},
    {h:'Bias — Know 5 By Name', items:[
      'Prejudice/Stereotype, Selection (3 subtypes), Reporting, Automation, Confirmation.',
      'Removing protected attributes does NOT remove bias — proxies leak it back.'
    ]},
    {h:'CT/CD vs CI/CD', items:[
      'DataOps → ModelOps → DevOps = MLOps.',
      '<strong>CT/CD ≠ CI/CD</strong> — Continuous Training + Continuous Deployment. Explicitly tested.'
    ]},
    {h:'Model Serialization', items:[
      '<strong>ONNX</strong> = cross-framework standard — the answer for "interoperability."',
      'Pickle = Python-only + security risk.'

},

      ${T([

        ['Document','JSONPath','NoSQL','MongoDB, CouchDB'],
        ['Key-Value','By key only','NoSQL','Redis, DynamoDB']

      ${callout('tip','ACID vs BASE','ACID (SQL) = Atomicity, Consistency, Isolation, Durability — banking/e-commerce. BASE (NoSQL) = Basically Available, Soft state, Eventual consistency — social media/web-scale.')}

        ['3NF','2NF + no transitive dependencies'],
        ['BCNF','Every determinant is a candidate key']

    {title:'OLTP vs OLAP', tags:['high'], body:`

/* ============================================================
   STATE
   ============================================================ */
let progress = {};
try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e){ progress = {}; }
let activeId = 'cheatsheet';

function saveProgress(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e){}
}
function cardKey(sessionId, cardIdx){ return sessionId + ':' + cardIdx; }

/* ============================================================
   PROGRESS CALCULATIONS
   ============================================================ */
function sessionProgress(s){
  if(s.kind !== 'session') return null;
  const total = s.cards.length;
  let done = 0;
  s.cards.forEach((c,i)=>{ if(progress[cardKey(s.id,i)]) done++; });
  return {done, total, pct: total ? Math.round(done/total*100) : 0};
}
function globalProgress(){
  let done=0, total=0;
  SESSIONS.filter(s=>s.kind==='session').forEach(s=>{
    total += s.cards.length;
    s.cards.forEach((c,i)=>{ if(progress[cardKey(s.id,i)]) done++; });
  });
  return {done, total, pct: total ? Math.round(done/total*100) : 0};
}

/* ============================================================
   RENDER: TAB RAIL
   ============================================================ */
function ringSvg(pct, size, strokeW, idSuffix){
  const r = (size - strokeW) / 2;
  const circumference = 2 * Math.PI * r;
  const offset = circumference - (pct/100) * circumference;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#262c3d" stroke-width="${strokeW}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#2dd4a8" stroke-width="${strokeW}"
      stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"
      style="transition:stroke-dashoffset .3s ease"/>
  </svg>`;
}

function renderTabRail(){
  const rail = document.getElementById('tabRail');
  rail.innerHTML = '';

  SESSIONS.forEach((s, idx) => {
    if(s.kind === 'session' && idx === 2){
      const div = document.createElement('div');
      div.className = 'tab-divider';
      rail.appendChild(div);
    }
    const tab = document.createElement('div');
    tab.className = 'tab' + (s.id === activeId ? ' active' : '');
    tab.dataset.id = s.id;

    let ringHtml = '';
    let label = s.tabName;
    if(s.kind === 'session'){
      const p = sessionProgress(s);
      ringHtml = `<div class="tab-ring">${ringSvg(p.pct, 22, 3, s.id)}</div>`;
      label = s.id.toUpperCase() + ' · ' + s.tabName;
    } else {
      ringHtml = `<span style="font-size:14px">${s.icon}</span>`;
    }

    tab.innerHTML = `${ringHtml}<span class="tab-name">${label}</span>`;
    tab.setAttribute('tabindex', '0');
    tab.setAttribute('role', 'tab');
    tab.setAttribute('aria-selected', s.id === activeId ? 'true' : 'false');
    tab.addEventListener('click', () => selectSession(s.id));
    tab.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); selectSession(s.id); }
    });
    rail.appendChild(tab);
  });

  // glossary tab (synthetic, not in SESSIONS array)
  const gdiv = document.createElement('div');
  gdiv.className = 'tab-divider';
  rail.appendChild(gdiv);
  const gtab = document.createElement('div');
  gtab.className = 'tab' + (activeId === 'glossary' ? ' active' : '');
  gtab.dataset.id = 'glossary';
  gtab.innerHTML = `<span style="font-size:14px">📖</span><span class="tab-name">Glossary</span>`;
  gtab.setAttribute('tabindex', '0');
  gtab.setAttribute('role', 'tab');
  gtab.addEventListener('click', () => selectSession('glossary'));
  gtab.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); selectSession('glossary'); }
  });
  rail.appendChild(gtab);

  requestAnimationFrame(() => {
    const activeTab = rail.querySelector('.tab.active');
    if(activeTab) activeTab.scrollIntoView({block:'nearest', inline:'nearest'});
  });
}

function renderGlobalProgress(){
  const g = globalProgress();
  document.getElementById('globalPct').textContent = g.pct + '%';
  const circumference = 2 * Math.PI * 14;
  const offset = circumference - (g.pct/100) * circumference;
  document.getElementById('globalRingFg').style.strokeDasharray = circumference;
  document.getElementById('globalRingFg').style.strokeDashoffset = offset;
}

/* ============================================================
   UNIFIED ITEM LIST (sessions + glossary) — single source of
   truth shared by the desktop rail and the mobile sheet/trigger
   ============================================================ */
function getAllItems(){
  const items = SESSIONS.map(s => ({
    id: s.id, kind: s.kind, icon: s.icon || '',
    shortLabel: s.kind === 'session' ? s.id.toUpperCase() : s.tabName,
    fullLabel: s.kind === 'session' ? (s.id.toUpperCase() + ' · ' + s.tabName) : s.tabName,
    progress: s.kind === 'session' ? sessionProgress(s) : null
  }));
  items.push({id:'glossary', kind:'glossary', icon:'📖', shortLabel:'Glossary', fullLabel:'Glossary', progress:null});
  return items;
}

/* ============================================================
   MOBILE: compact trigger + bottom sheet picker
   ============================================================ */
function renderMobileSwitcher(){
  const items = getAllItems();
  const current = items.find(i => i.id === activeId) || items[0];

  const ringEl = document.getElementById('msqRing');
  const labelEl = document.getElementById('msqLabel');

  if(current.kind === 'session'){
    ringEl.innerHTML = ringSvg(current.progress.pct, 24, 3);
    labelEl.innerHTML = `${current.fullLabel}<small>${current.progress.done}/${current.progress.total} mastered</small>`;
  } else {
    ringEl.innerHTML = `<span style="font-size:16px">${current.icon}</span>`;
    labelEl.innerHTML = `${current.fullLabel}<small>Tap to switch session</small>`;
  }

  const sheetList = document.getElementById('sheetList');
  sheetList.innerHTML = '';
  items.forEach((item, idx) => {
    if(item.kind === 'session' && idx === 2){
      const div = document.createElement('div');
      div.className = 'sheet-divider';
      sheetList.appendChild(div);
    }
    const row = document.createElement('div');
    row.className = 'sheet-item' + (item.id === activeId ? ' active' : '');
    row.setAttribute('role','button');
    row.setAttribute('tabindex','0');

    let ringHtml;
    if(item.kind === 'session'){
      ringHtml = `<span class="si-ring">${ringSvg(item.progress.pct, 26, 3)}</span>`;
    } else {
      ringHtml = `<span class="si-icon">${item.icon}</span>`;
    }
    const meta = item.kind === 'session' ? `${item.progress.done}/${item.progress.total} mastered` : 'Reference';

    row.innerHTML = `${ringHtml}<span class="si-text"><span class="si-name">${item.fullLabel}</span><span class="si-meta">${meta}</span></span>`;
    const activate = () => { selectSession(item.id); closeSheet(); };
    row.addEventListener('click', activate);
    row.addEventListener('keydown', (e) => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); activate(); } });
    sheetList.appendChild(row);
  });
}

function openSheet(){
  document.getElementById('sheetBackdrop').classList.add('show');
  document.getElementById('sessionSheet').classList.add('show');
}
function closeSheet(){
  document.getElementById('sheetBackdrop').classList.remove('show');
  document.getElementById('sessionSheet').classList.remove('show');
}

/* ============================================================
   DESKTOP: keep the active item visible in the vertical sidebar.
   ============================================================ */
function updateRailFades(){
  const rail = document.getElementById('tabRail');
  if(!rail || window.innerWidth <= 900) return;
  const activeTab = rail.querySelector('.tab.active');
  if(activeTab) activeTab.scrollIntoView({block:'nearest', inline:'nearest'});
}

/* ============================================================
   RENDER: CONTENT PANELS
   ============================================================ */
function selectSession(id){
  activeId = id;
  renderTabRail();
  renderMobileSwitcher();
  renderContent();
  const mainArea = document.getElementById('mainArea');
  if(typeof mainArea.scrollTo === 'function'){
    mainArea.scrollTo({top:0, behavior:'instant'});
  } else {
    mainArea.scrollTop = 0;
  }
  updateRailFades();
}

function renderContent(){
  const root = document.getElementById('contentInner');

  if(activeId === 'glossary'){
    root.innerHTML = renderGlossaryView();
    attachGlossarySearch();
    return;
  }

  const s = SESSIONS.find(x => x.id === activeId);
  if(!s) { root.innerHTML = '<div class="empty-state"><div class="big">🤷</div>Session not found.</div>'; return; }

  if(s.kind === 'cheatsheet'){
    root.innerHTML = renderCheatsheetView(s);
    return;
  }
  if(s.kind === 'crosscut'){
    root.innerHTML = renderCrosscutView(s);
    return;
  }
  // kind === 'session'
  root.innerHTML = renderSessionView(s);
  attachAccordionHandlers(s);
}

function renderCheatsheetView(s){
  let html = `
    <div class="session-head">
      <div class="eyebrow">${s.icon} Quick Reference</div>
      <h1>${s.title}</h1>
      <p class="desc">${s.desc}</p>
    </div>
    <div class="cheat-grid">`;
  s.groups.forEach(g => {
    html += `<div class="cheat-card"><h4>${g.h}</h4><ul>${g.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
  });
  html += `</div>`;
  return html;
}

function renderCrosscutView(s){
  let html = `
    <div class="session-head">
      <div class="eyebrow">${s.icon} Cross-Reference</div>
      <h1>${s.title}</h1>
      <p class="desc">${s.desc}</p>
    </div>
    <table class="mini" style="font-size:13px">
      <tr><th>Concept</th><th>Appears In</th><th>What Changes</th></tr>
      ${s.rows.map(r => `<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}
    </table>`;
  return html;
}

function renderSessionView(s){
  const p = sessionProgress(s);
  let html = `
    <div class="session-head">
      <div class="eyebrow">${s.id.toUpperCase()} · ${p.done}/${p.total} mastered</div>
      <h1>${s.title}</h1>
      <p class="desc">${s.desc}</p>
      <div class="session-tools">
        <button class="btn-sm" id="expandAllBtn">⤢ Expand all</button>
        <button class="btn-sm" id="collapseAllBtn">⤡ Collapse all</button>
        <button class="btn-sm" id="checkAllBtn">✓ Mark all done</button>
        <button class="btn-sm" id="resetBtn">↺ Reset progress</button>
      </div>
    </div>
    <div class="card-list" id="cardList">`;

  s.cards.forEach((c, i) => {
    const key = cardKey(s.id, i);
    const isDone = !!progress[key];
    const tagsHtml = (c.tags||[]).map(t => `<span class="mini-tag ${t}">${t === 'trap' ? 'Trap' : 'High-Yield'}</span>`).join('');
    html += `
      <div class="card ${isDone ? 'done' : ''}" data-idx="${i}">
        <div class="card-head">
          <div class="checkbox ${isDone ? 'checked' : ''}" data-action="toggle-check" data-idx="${i}">
            <svg viewBox="0 0 24 24" fill="none" stroke="#04140f" stroke-width="3"><path d="M4 12l5 5L20 6"/></svg>
          </div>
          <div class="card-title" data-action="toggle-open" data-idx="${i}">${c.title}</div>
          <div class="card-tags">${tagsHtml}</div>
          <div class="chevron" data-action="toggle-open" data-idx="${i}">▸</div>
        </div>
        <div class="card-body" data-idx="${i}">
          <div class="card-body-inner">${c.body}</div>
        </div>
      </div>`;
  });

  html += `</div>`;
  return html;
}

function attachAccordionHandlers(s){
  const list = document.getElementById('cardList');

  list.querySelectorAll('[data-action="toggle-open"]').forEach(el => {
    el.setAttribute('tabindex', '0');
    el.setAttribute('role', 'button');
    const openHandler = () => {
      const idx = el.dataset.idx;
      const card = list.querySelector(`.card[data-idx="${idx}"]`);
      const body = card.querySelector('.card-body');
      const isOpen = card.classList.contains('open');
      if(isOpen){
        body.style.maxHeight = '0px';
        card.classList.remove('open');
      } else {
        card.classList.add('open');
        body.style.maxHeight = body.scrollHeight + 'px';
      }
    };
    el.addEventListener('click', openHandler);
    el.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openHandler(); }
    });
  });

  list.querySelectorAll('[data-action="toggle-check"]').forEach(el => {
    el.setAttribute('tabindex', '0');
    el.setAttribute('role', 'checkbox');
    const checkHandler = (e) => {
      e.stopPropagation();
      const idx = el.dataset.idx;
      const key = cardKey(s.id, idx);
      progress[key] = !progress[key];
      saveProgress();
      el.classList.toggle('checked');
      el.setAttribute('aria-checked', progress[key] ? 'true' : 'false');
      const card = list.querySelector(`.card[data-idx="${idx}"]`);
      card.classList.toggle('done', !!progress[key]);
      renderTabRail();
      renderMobileSwitcher();
      renderGlobalProgress();
      showToast(progress[key] ? 'Marked as mastered' : 'Unmarked');
    };
    el.addEventListener('click', checkHandler);
    el.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){ checkHandler(e); }
    });
  });

  document.getElementById('expandAllBtn').addEventListener('click', () => {
    list.querySelectorAll('.card').forEach(card => {
      card.classList.add('open');
      const body = card.querySelector('.card-body');
      body.style.maxHeight = body.scrollHeight + 'px';
    });
  });
  document.getElementById('collapseAllBtn').addEventListener('click', () => {
    list.querySelectorAll('.card').forEach(card => {
      card.classList.remove('open');
      card.querySelector('.card-body').style.maxHeight = '0px';
    });
  });
  document.getElementById('checkAllBtn').addEventListener('click', () => {
    s.cards.forEach((c,i) => progress[cardKey(s.id,i)] = true);
    saveProgress();
    renderContent();
    renderTabRail();
    renderMobileSwitcher();
    renderGlobalProgress();
    showToast('Session marked complete');
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    s.cards.forEach((c,i) => delete progress[cardKey(s.id,i)]);
    saveProgress();
    renderContent();
    renderTabRail();
    renderMobileSwitcher();
    renderGlobalProgress();
    showToast('Progress reset for this session');
  });
}

/* ============================================================
   GLOSSARY VIEW
   ============================================================ */
function renderGlossaryView(){
  let html = `
    <div class="session-head">
      <div class="eyebrow">📖 Reference</div>
      <h1>Master Glossary</h1>
      <p class="desc">High-frequency terms across all 8 sessions. Type to filter.</p>
    </div>
    <div class="glossary-search"><input type="text" id="glossFilter" placeholder="Filter terms…" autocomplete="off"></div>
    <div class="gloss-grid" id="glossGrid">
      ${GLOSSARY.map(([term,def]) => `
        <div class="gloss-item" data-term="${term.toLowerCase()}" data-def="${def.toLowerCase()}">
          <div class="gloss-term">${term}</div>
          <div class="gloss-def">${def}</div>
        </div>`).join('')}
    </div>`;
  return html;
}
function attachGlossarySearch(){
  const input = document.getElementById('glossFilter');
  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    document.querySelectorAll('#glossGrid .gloss-item').forEach(item => {
      const match = !q || item.dataset.term.includes(q) || item.dataset.def.includes(q);
      item.classList.toggle('hidden', !match);
    });
  });
}

/* ============================================================
   GLOBAL SEARCH
   ============================================================ */
function buildSearchIndex(){
  const index = [];
  SESSIONS.filter(s=>s.kind==='session').forEach(s => {
    s.cards.forEach((c,i) => {
      const plain = c.body.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
      index.push({sessionId:s.id, sessionName:s.tabName, cardIdx:i, title:c.title, snippet:plain.slice(0,140)});
    });
  });
  return index;
}
const SEARCH_INDEX = buildSearchIndex();

function highlightMatch(text, q){
  if(!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'ig');
  return text.replace(re, '<mark>$1</mark>');
}

function attachGlobalSearch(){
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  function runSearch(){
    const q = input.value.trim().toLowerCase();
    if(!q){ results.classList.remove('show'); results.innerHTML=''; return; }
    const matches = SEARCH_INDEX.filter(item =>
      item.title.toLowerCase().includes(q) || item.snippet.toLowerCase().includes(q)
    ).slice(0, 8);

    if(matches.length === 0){
      results.innerHTML = `<div class="sr-empty">No matches for "${q}"</div>`;
    } else {
      results.innerHTML = matches.map(m => `
        <div class="sr-item" data-session="${m.sessionId}" data-idx="${m.cardIdx}">
          <div class="sr-session">${m.sessionId.toUpperCase()} · ${m.sessionName}</div>
          <div class="sr-title">${highlightMatch(m.title, q)}</div>
          <div class="sr-snippet">${highlightMatch(m.snippet, q)}…</div>
        </div>`).join('');
    }
    results.classList.add('show');
  }

  input.addEventListener('input', runSearch);
  input.addEventListener('focus', () => { if(input.value.trim()) runSearch(); });

  results.addEventListener('click', (e) => {
    const item = e.target.closest('.sr-item');
    if(!item) return;
    const sessionId = item.dataset.session;
    const idx = parseInt(item.dataset.idx, 10);
    selectSession(sessionId);
    results.classList.remove('show');
    input.value = '';
    // open + scroll to the matched card after render
    setTimeout(() => {
      const card = document.querySelector(`.card[data-idx="${idx}"]`);
      if(card){
        card.classList.add('open');
        const body = card.querySelector('.card-body');
        body.style.maxHeight = body.scrollHeight + 'px';
        card.scrollIntoView({behavior:'smooth', block:'center'});
        card.style.borderColor = 'var(--accent)';
        setTimeout(()=> card.style.borderColor='', 1500);
      }
    }, 60);
  });

  document.addEventListener('click', (e) => {
    if(!e.target.closest('.search-wrap')) results.classList.remove('show');
  });

  // keyboard shortcut: "/" focuses search
  document.addEventListener('keydown', (e) => {
    if(e.key === '/' && document.activeElement !== input){
      e.preventDefault();
      input.focus();
    }
    if(e.key === 'Escape'){
      input.blur();
      results.classList.remove('show');
      closeSheet();
    }
  });
}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  renderTabRail();
  renderMobileSwitcher();
  renderGlobalProgress();
  renderContent();
  attachGlobalSearch();

  // mobile switcher trigger opens the sheet
  document.getElementById('mobileSwitcherTrigger').addEventListener('click', openSheet);
  document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);

  // desktop rail scroll-fade affordance
  const rail = document.getElementById('tabRail');
  rail.addEventListener('scroll', updateRailFades);
  window.addEventListener('resize', updateRailFades);
  updateRailFades();
}
init();
</script>

<script>
/* ---- Shared study-hub day/night toggle (localStorage key shared site-wide) ---- */
(function () {
  const THEME_KEY = "study-hub-theme";
  const root = document.documentElement;
  const toggle = document.getElementById("hubThemeToggle");
  const toggleText = document.getElementById("hubThemeToggleText");

  const saved = localStorage.getItem(THEME_KEY);
  if (saved === "light" || saved === "dark") {
    root.setAttribute("data-theme", saved);
  }
  const syncLabel = () => {
    const isLight = root.getAttribute("data-theme") === "light";
    if (toggle) toggle.setAttribute("aria-pressed", String(isLight));
    if (toggleText) toggleText.textContent = isLight ? "Light mode" : "Night mode";
  };
  syncLabel();

  if (toggle) {
    toggle.addEventListener("click", () => {
      const isDark = root.getAttribute("data-theme") !== "light";
      root.setAttribute("data-theme", isDark ? "light" : "dark");
      localStorage.setItem(THEME_KEY, isDark ? "light" : "dark");
      syncLabel();
    });
  }
})();
</script>
