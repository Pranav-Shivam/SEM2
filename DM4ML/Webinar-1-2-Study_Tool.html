<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM4ML Study Tool — Data Management for Machine Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: dark;
  --font-display: "Fraunces", serif;
  --font-ui: "Space Grotesk", sans-serif;
  --font-mono: "IBM Plex Mono", monospace;
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --shadow-soft: 0 18px 48px rgba(8, 15, 28, 0.14);
  --shadow-lift: 0 24px 60px rgba(7, 16, 34, 0.24);
  --page-bg:
    radial-gradient(circle at top left, rgba(71, 164, 255, 0.18), transparent 28%),
    radial-gradient(circle at 85% 12%, rgba(255, 181, 86, 0.16), transparent 22%),
    linear-gradient(180deg, #07111f 0%, #0b1625 42%, #0e1b2d 100%);
  --surface: rgba(11, 20, 34, 0.78);
  --surface-strong: rgba(15, 26, 43, 0.96);
  --surface-soft: rgba(255, 255, 255, 0.05);
  --surface-muted: rgba(151, 170, 199, 0.12);
  --card-bg: rgba(13, 24, 40, 0.88);
  --border: rgba(160, 184, 218, 0.16);
  --border-strong: rgba(186, 205, 232, 0.28);
  --text: #edf4ff;
  --text-muted: #afbed4;
  --text-faint: #7e90ab;
  --accent: #ffb556;
  --accent-2: #60c0ff;
  --accent-3: #8ce7c2;
  --accent-4: #cb9cff;
  --success-bg: rgba(140, 231, 194, 0.14);
  --success-text: #b9f6dd;
  --tab-idle: rgba(255, 255, 255, 0.05);
  --input-bg: rgba(255, 255, 255, 0.05);
  --chip-bg: rgba(255, 255, 255, 0.07);
  --hero-outline: linear-gradient(135deg, rgba(255, 181, 86, 0.42), rgba(96, 192, 255, 0.25), rgba(203, 156, 255, 0.26));
  --grid-line: rgba(255, 255, 255, 0.05);

  /* page-specific tokens, chained onto the shared engine above so this
     page keeps its own visual vocabulary but rides the shared theme system */
  --bg2: var(--surface); --bg3: var(--surface-muted); --bg-card: var(--card-bg);
  --border-light: var(--border-strong);
  --text-dim: var(--text-muted);
  --purple: var(--accent-3); --purple-dim: var(--success-bg);
  --teal: var(--accent-3); --teal-dim: var(--success-bg);
  --amber: var(--accent); --amber-dim: rgba(255, 181, 86, 0.14);
  --sky: var(--accent-2); --sky-dim: rgba(96, 192, 255, 0.14);
  --coral: #f0795a; --coral-dim: rgba(240, 121, 90, 0.14);
  --green: var(--success-text); --red: #f87171;
  --radius:12px;
  --shadow: var(--shadow-soft);
  --maxw:880px;
}

html[data-theme="light"]{
  color-scheme: light;
  --page-bg:
    radial-gradient(circle at top left, rgba(122, 187, 255, 0.25), transparent 28%),
    radial-gradient(circle at 88% 12%, rgba(255, 192, 100, 0.28), transparent 24%),
    linear-gradient(180deg, #f5f8fc 0%, #ecf3fb 50%, #e7eef7 100%);
  --surface: rgba(255, 255, 255, 0.78);
  --surface-strong: rgba(255, 255, 255, 0.92);
  --surface-soft: rgba(18, 42, 68, 0.05);
  --surface-muted: rgba(38, 76, 124, 0.08);
  --card-bg: rgba(255, 255, 255, 0.88);
  --border: rgba(48, 82, 130, 0.14);
  --border-strong: rgba(45, 80, 128, 0.24);
  --text: #10233e;
  --text-muted: #4f6686;
  --text-faint: #7185a3;
  --accent: #de8d22;
  --accent-2: #2483db;
  --accent-3: #128868;
  --accent-4: #8750df;
  --success-bg: rgba(18, 136, 104, 0.1);
  --success-text: #0c7258;
  --tab-idle: rgba(19, 43, 73, 0.05);
  --input-bg: rgba(19, 43, 73, 0.05);
  --chip-bg: rgba(19, 43, 73, 0.07);
  --hero-outline: linear-gradient(135deg, rgba(222, 141, 34, 0.32), rgba(36, 131, 219, 0.22), rgba(135, 80, 223, 0.2));
  --grid-line: rgba(27, 48, 79, 0.06);
  --shadow-soft: 0 18px 42px rgba(31, 64, 105, 0.10);
  --shadow-lift: 0 24px 54px rgba(31, 64, 105, 0.14);

  /* page-specific hues that don't have a shared-accent analogue */
  --coral: #c1502f; --coral-dim: rgba(193, 80, 47, 0.12);
  --amber-dim: rgba(222, 141, 34, 0.12);
  --sky-dim: rgba(36, 131, 219, 0.12);
  --red: #c0392b;
}

/* text/icons sitting directly on a solid accent fill need to flip with the accent's own lightness */
html[data-theme="light"] .nav-item.active .num,
html[data-theme="light"] .bc-fill span,
html[data-theme="light"] .q-opt.correct .opt-letter,
html[data-theme="light"] .q-opt.wrong .opt-letter{color:#eafff5;}
html[data-theme="light"] .cl-box svg path{stroke:#eafff5;}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--page-bg); color:var(--text);
  font-family:var(--font-ui),-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.6; font-size:15.5px;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-light); border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:#454b62;}

a{color:var(--sky); text-decoration:none;}
code{font-family:var(--font-mono),"SF Mono",Menlo,Consolas,monospace; font-size:0.88em;}

/* ============ APP LAYOUT ============ */
/* ---- Hub topbar ---- */
.hub-topbar{
  position:sticky; top:0; z-index:60; display:flex; align-items:center; justify-content:space-between;
  gap:12px; padding:10px 20px; background:var(--surface-strong); border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px); font-family:var(--font-ui);
}
.hub-brand{display:flex; align-items:center; gap:9px; color:var(--text); text-decoration:none; font-weight:650; font-size:13.5px;}
.hub-brand-badge{
  width:24px; height:24px; border-radius:8px; background:var(--purple-dim); color:var(--purple);
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex-shrink:0;
}
.hub-theme-toggle{
  display:flex; align-items:center; gap:7px; padding:7px 14px; border-radius:20px;
  background:var(--surface); border:1px solid var(--border); color:var(--text); font-size:12px;
  font-weight:650; cursor:pointer; box-shadow:var(--shadow-soft); font-family:var(--font-ui);
}
.hub-theme-toggle:hover{border-color:var(--border-strong);}

#app{display:flex; min-height:100vh;}

/* ---- Sidebar ---- */
#sidebar{
  width:280px; flex-shrink:0; background:var(--bg2);
  border-right:1px solid var(--border);
  position:sticky; top:52px; height:calc(100vh - 52px); overflow-y:auto;
  display:flex; flex-direction:column; z-index:50;
  transition:transform 0.25s ease;
}
.sb-header{padding:20px 18px 14px; border-bottom:1px solid var(--border);}
.sb-title{font-size:15px; font-weight:700; letter-spacing:0.2px; color:var(--text);}
.sb-sub{font-size:11.5px; color:var(--text-faint); margin-top:3px; line-height:1.4;}

.progress-wrap{padding:14px 18px; border-bottom:1px solid var(--border);}
.progress-label{display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;}
.progress-bar-bg{height:6px; background:var(--bg3); border-radius:4px; overflow:hidden;}
.progress-bar-fill{height:100%; background:linear-gradient(90deg,var(--teal),var(--sky)); border-radius:4px; transition:width 0.4s ease; width:0%;}

.mode-tabs{display:flex; gap:4px; padding:12px 14px; border-bottom:1px solid var(--border);}
.mode-tab{
  flex:1; text-align:center; padding:8px 4px; font-size:12.5px; font-weight:600;
  border-radius:7px; cursor:pointer; color:var(--text-dim); transition:all 0.15s;
  border:1px solid transparent;
}
.mode-tab:hover{background:var(--bg3); color:var(--text);}
.mode-tab.active{background:var(--purple-dim); color:var(--purple); border-color:var(--border-strong);}

.nav-scroll{flex:1; overflow-y:auto; padding:10px 10px 18px;}
.nav-section-label{font-size:10.5px; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-faint); padding:14px 10px 6px;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px;
  cursor:pointer; color:var(--text-dim); font-size:13.6px; margin-bottom:2px;
  transition:all 0.13s; position:relative;
}
.nav-item:hover{background:var(--bg3); color:var(--text);}
.nav-item.active{background:var(--purple-dim); color:var(--purple); font-weight:600;}
.nav-item .num{
  width:20px; height:20px; border-radius:6px; background:var(--bg3); color:var(--text-faint);
  display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; flex-shrink:0;
}
.nav-item.active .num{background:var(--purple); color:#1a1428;}
.nav-item.visited:not(.active) .num{background:var(--teal-dim); color:var(--teal);}
.nav-item .label{flex:1; min-width:0;}
.nav-item .check{font-size:11px; color:var(--teal); flex-shrink:0;}

.sb-footer{padding:12px 18px; border-top:1px solid var(--border); font-size:10.5px; color:var(--text-faint); text-align:center;}

/* ---- Mobile sidebar toggle ---- */
#sb-toggle{
  display:none; position:fixed; top:66px; left:14px; z-index:100;
  width:40px; height:40px; border-radius:10px; background:var(--bg-card);
  border:1px solid var(--border); color:var(--text); align-items:center; justify-content:center;
  cursor:pointer; box-shadow:var(--shadow);
}
#sb-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:49;}

/* ---- Main content ---- */
#main{flex:1; min-width:0; padding:38px 28px 80px; display:flex; justify-content:center;}
#content{width:100%; max-width:var(--maxw);}

.page-header{margin-bottom:26px;}
.page-eyebrow{font-size:12px; color:var(--purple); text-transform:uppercase; letter-spacing:0.8px; font-weight:700; margin-bottom:8px;}
.page-title{font-family:var(--font-display); font-size:28px; font-weight:800; margin:0 0 8px; color:var(--text); letter-spacing:-0.3px;}
.page-desc{color:var(--text-dim); font-size:15px; max-width:680px;}

h2.sec-title{font-size:19px; font-weight:700; margin:36px 0 14px; color:var(--text); display:flex; align-items:center; gap:8px;}
h2.sec-title:first-of-type{margin-top:24px;}
h3.sub-title{font-size:15.5px; font-weight:700; margin:22px 0 10px; color:var(--text);}
p{color:var(--text-dim); margin:10px 0;}
ul.plain, ol.plain{color:var(--text-dim); padding-left:22px;}
ul.plain li, ol.plain li{margin-bottom:6px;}
strong{color:var(--text); font-weight:650;}

/* ============ CALLOUT BOXES ============ */
.callout{
  border-radius:var(--radius); padding:14px 16px 15px; margin:14px 0;
  border:1px solid; position:relative; font-size:14.5px;
}
.callout .co-label{
  display:flex; align-items:center; gap:7px; font-size:11.5px; font-weight:800;
  text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px;
}
.callout p{margin:4px 0; color:var(--text-dim);}
.callout .source-tag{
  display:inline-block; margin-top:8px; font-size:11px; font-weight:600;
  padding:2px 8px; border-radius:5px; opacity:0.85;
}

.co-def{background:var(--purple-dim); border-color:var(--border-strong);}
.co-def .co-label{color:var(--purple);}
.co-insight{background:var(--teal-dim); border-color:var(--border-strong);}
.co-insight .co-label{color:var(--teal);}
.co-tip{background:var(--amber-dim); border-color:var(--border-strong);}
.co-tip .co-label{color:var(--amber);}
.co-research{background:var(--sky-dim); border-color:var(--border-strong);}
.co-research .co-label{color:var(--sky);}
.co-research .source-tag{background:#0d2733; color:var(--sky);}
.co-warn{background:var(--coral-dim); border-color:var(--border-strong);}
.co-warn .co-label{color:var(--coral);}

/* ============ TABLES ============ */
.tbl-wrap{overflow-x:auto; margin:16px 0; border-radius:var(--radius); border:1px solid var(--border);}
table.cmp{width:100%; border-collapse:collapse; font-size:14px;}
table.cmp th{
  background:var(--bg3); color:var(--text); text-align:left; padding:11px 14px;
  font-weight:700; font-size:12.5px; text-transform:uppercase; letter-spacing:0.3px;
  border-bottom:1px solid var(--border-light);
}
table.cmp td{padding:11px 14px; border-bottom:1px solid var(--border); color:var(--text-dim); vertical-align:top;}
table.cmp tr:last-child td{border-bottom:none;}
table.cmp tr:hover td{background:rgba(255,255,255,0.02);}
table.cmp td.hl-purple{color:var(--purple); font-weight:600;}
table.cmp td.hl-teal{color:var(--teal); font-weight:600;}

/* ============ EXPANDABLE CARDS ============ */
.exp-card{
  border:1px solid var(--border); border-radius:var(--radius); margin:10px 0;
  background:var(--bg-card); overflow:hidden;
}
.exp-head{
  display:flex; align-items:center; justify-content:space-between; padding:14px 16px;
  cursor:pointer; user-select:none; transition:background 0.15s;
}
.exp-head:hover{background:var(--bg3);}
.exp-head .title{font-weight:650; color:var(--text); font-size:14.5px; display:flex; align-items:center; gap:10px;}
.exp-head .chev{color:var(--text-faint); transition:transform 0.2s; font-size:12px;}
.exp-card.open .chev{transform:rotate(90deg);}
.exp-body{max-height:0; overflow:hidden; transition:max-height 0.25s ease;}
.exp-card.open .exp-body{max-height:2000px;}
.exp-body-inner{padding:0 16px 16px; color:var(--text-dim); font-size:14px;}
.exp-body-inner p{margin:8px 0;}

/* ============ FLOW DIAGRAM ============ */
.flow{display:flex; flex-wrap:wrap; align-items:center; gap:0; margin:18px 0; padding:18px; background:var(--bg-card); border-radius:var(--radius); border:1px solid var(--border);}
.flow-step{
  background:var(--bg3); border:1px solid var(--border-light); border-radius:10px;
  padding:10px 14px; font-size:13px; font-weight:600; color:var(--text); text-align:center;
  min-width:90px;
}
.flow-step.acc-purple{border-color:var(--border-strong); background:var(--purple-dim); color:var(--purple);}
.flow-step.acc-teal{border-color:var(--border-strong); background:var(--teal-dim); color:var(--teal);}
.flow-step.acc-amber{border-color:var(--border-strong); background:var(--amber-dim); color:var(--amber);}
.flow-step.acc-sky{border-color:var(--border-strong); background:var(--sky-dim); color:var(--sky);}
.flow-arrow{color:var(--text-faint); font-size:18px; margin:0 8px; flex-shrink:0;}
.flow-cap{width:100%; font-size:11.5px; color:var(--text-faint); margin-top:2px;}

@media(max-width:600px){
  .flow{flex-direction:column; align-items:stretch;}
  .flow-arrow{transform:rotate(90deg); margin:2px auto;}
  .flow-step{min-width:0;}
}

/* ============ TABS (variants) ============ */
.vtabs-bar{display:flex; gap:4px; border-bottom:1px solid var(--border); margin:16px 0 0; flex-wrap:wrap;}
.vtab-btn{
  padding:9px 16px; font-size:13px; font-weight:600; color:var(--text-dim);
  cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s;
}
.vtab-btn:hover{color:var(--text);}
.vtab-btn.active{color:var(--purple); border-bottom-color:var(--purple);}
.vtab-panels{border:1px solid var(--border); border-top:none; border-radius:0 0 var(--radius) var(--radius); padding:16px; background:var(--bg-card);}
.vtab-panel{display:none;}
.vtab-panel.active{display:block;}

/* ============ CODE BLOCKS ============ */
.code-block{
  background:#0a0c12; border:1px solid var(--border); border-radius:var(--radius);
  margin:14px 0; overflow:hidden;
}
.code-head{
  display:flex; justify-content:space-between; align-items:center; padding:8px 14px;
  background:var(--bg3); font-size:11px; color:var(--text-faint); font-weight:700;
  text-transform:uppercase; letter-spacing:0.5px;
}
.code-block pre{margin:0; padding:14px 16px; overflow-x:auto; font-size:13px; line-height:1.6; color:#d8e0ee;}
.code-block .kw{color:#c792ea;} .code-block .str{color:#a8e6a3;} .code-block .com{color:#6b7080;} .code-block .fn{color:#82aaff;} .code-block .num{color:#f78c6c;}

/* ============ BAR CHART ============ */
.barchart{margin:16px 0; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 18px 10px;}
.bc-title{font-size:12.5px; font-weight:700; color:var(--text-dim); margin-bottom:14px; text-transform:uppercase; letter-spacing:0.4px;}
.bc-row{display:flex; align-items:center; gap:10px; margin-bottom:11px;}
.bc-label{width:140px; flex-shrink:0; font-size:12.5px; color:var(--text-dim); text-align:right;}
.bc-track{flex:1; background:var(--bg3); border-radius:5px; height:22px; overflow:hidden; position:relative;}
.bc-fill{height:100%; border-radius:5px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px; transition:width 1s ease; width:0%;}
.bc-fill span{font-size:11px; font-weight:700; color:#0a0c12;}
.bc-note{font-size:11px; color:var(--text-faint); margin-top:6px; text-align:center;}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:9px;
  font-size:13.5px; font-weight:650; cursor:pointer; border:1px solid var(--border-light);
  background:var(--bg3); color:var(--text); transition:all 0.15s; user-select:none;
}
.btn:hover{background:#262b3c; transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--purple-dim); color:var(--purple); border-color:var(--border-strong);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-sm{padding:6px 13px; font-size:12px;}
.btn-row{display:flex; gap:10px; margin:18px 0; flex-wrap:wrap;}

/* ============ PAGE NAV (prev/next) ============ */
.page-nav{display:flex; justify-content:space-between; margin-top:46px; padding-top:22px; border-top:1px solid var(--border); gap:14px;}
.pn-btn{
  flex:1; max-width:48%; padding:13px 16px; border:1px solid var(--border); border-radius:var(--radius);
  cursor:pointer; transition:all 0.15s; background:var(--bg-card);
}
.pn-btn:hover{border-color:var(--purple); background:var(--bg3);}
.pn-btn .pn-dir{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.5px; font-weight:700;}
.pn-btn .pn-name{font-size:14px; color:var(--text); font-weight:650; margin-top:3px;}
.pn-btn.pn-next{text-align:right; margin-left:auto;}
.pn-spacer{flex:1;}

/* ============ QUIZ MODE ============ */
.quiz-wrap{max-width:680px; margin:0 auto;}
.quiz-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
.dot-tracker{display:flex; gap:5px; flex-wrap:wrap;}
.qdot{width:11px; height:11px; border-radius:50%; background:var(--bg3); border:1px solid var(--border-light);}
.qdot.correct{background:var(--green); border-color:var(--green);}
.qdot.wrong{background:var(--red); border-color:var(--red);}
.qdot.current{box-shadow:0 0 0 2px var(--purple);}

.quiz-card{background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:26px; box-shadow:var(--shadow);}
.q-meta{display:flex; justify-content:space-between; font-size:12px; color:var(--text-faint); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.4px; font-weight:700;}
.q-text{font-size:17px; font-weight:650; color:var(--text); margin-bottom:20px; line-height:1.5;}
.q-opt{
  display:flex; align-items:flex-start; gap:12px; padding:13px 15px; border:1.5px solid var(--border);
  border-radius:10px; margin-bottom:9px; cursor:pointer; transition:all 0.15s; background:var(--bg3);
}
.q-opt:hover{border-color:var(--border-light); background:#22273a;}
.q-opt .opt-letter{
  width:24px; height:24px; border-radius:7px; background:var(--bg2); display:flex; align-items:center;
  justify-content:center; font-size:12px; font-weight:700; color:var(--text-dim); flex-shrink:0; margin-top:1px;
}
.q-opt .opt-text{color:var(--text-dim); font-size:14.5px; padding-top:1px;}
.q-opt.correct{border-color:var(--green); background:rgba(74,222,128,0.1);}
.q-opt.correct .opt-letter{background:var(--green); color:#0a0c12;}
.q-opt.wrong{border-color:var(--red); background:rgba(248,113,113,0.1);}
.q-opt.wrong .opt-letter{background:var(--red); color:#0a0c12;}
.q-opt.disabled{cursor:default;}
.q-opt.dim{opacity:0.45;}

.q-explain{
  margin-top:16px; padding:15px 16px; border-radius:10px; background:var(--bg3);
  border-left:3px solid var(--purple); font-size:13.8px; color:var(--text-dim); display:none;
}
.q-explain.show{display:block;}
.q-explain b{color:var(--sky);}
.q-footer{display:flex; justify-content:space-between; margin-top:20px;}

.score-screen{text-align:center; padding:40px 20px;}
.score-num{font-size:64px; font-weight:800; background:linear-gradient(135deg,var(--purple),var(--teal)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.score-label{font-size:15px; color:var(--text-dim); margin-top:6px;}
.score-msg{font-size:16px; margin:22px 0; color:var(--text);}

/* ============ FLASHCARD MODE ============ */
.fc-wrap{max-width:600px; margin:0 auto; text-align:center;}
.fc-progress{font-size:12.5px; color:var(--text-faint); margin-bottom:16px; font-weight:600;}
.fc-stage{perspective:1600px; height:340px; margin-bottom:20px;}
.fc-card{
  width:100%; height:100%; position:relative; cursor:pointer; transition:transform 0.5s;
  transform-style:preserve-3d;
}
.fc-card.flipped{transform:rotateY(180deg);}
.fc-face{
  position:absolute; inset:0; backface-visibility:hidden; border-radius:18px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:32px; box-shadow:var(--shadow); border:1px solid var(--border-light);
}
.fc-front{background:linear-gradient(160deg,#221d3a,#1a1d29);}
.fc-back{background:linear-gradient(160deg,#13312c,#1a1d29); transform:rotateY(180deg); overflow-y:auto;}
.fc-tag{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.6px; color:var(--purple); margin-bottom:14px;}
.fc-back .fc-tag{color:var(--teal);}
.fc-q{font-size:19px; font-weight:650; color:#fff; line-height:1.45;}
.fc-a{font-size:15.5px; color:#dadce5; line-height:1.55; text-align:left;}
.fc-hint{font-size:11.5px; color:var(--text-faint); margin-top:18px;}
.fc-rate-row{display:flex; gap:10px; justify-content:center; margin-top:6px;}
.fc-rate{
  flex:1; max-width:140px; padding:11px; border-radius:10px; cursor:pointer; font-size:13px;
  font-weight:700; border:1px solid var(--border-light); transition:all 0.15s;
}
.fc-rate.hard{background:var(--coral-dim); color:var(--coral);}
.fc-rate.good{background:var(--amber-dim); color:var(--amber);}
.fc-rate.easy{background:var(--teal-dim); color:var(--teal);}
.fc-rate:hover{filter:brightness(1.2); transform:translateY(-1px);}
.fc-counters{display:flex; justify-content:center; gap:18px; margin-top:18px; font-size:12.5px; color:var(--text-dim);}
.fc-counters span b{color:var(--text);}
.fc-nav{display:flex; justify-content:center; gap:12px; margin-top:18px;}
.fc-deck-select{margin-bottom:16px; display:flex; gap:6px; flex-wrap:wrap; justify-content:center;}
.fc-chip{padding:6px 13px; border-radius:20px; background:var(--bg3); border:1px solid var(--border); font-size:12px; color:var(--text-dim); cursor:pointer;}
.fc-chip.active{background:var(--purple-dim); color:var(--purple); border-color:var(--border-strong);}

/* ============ GLOSSARY ============ */
.gloss-search{
  width:100%; padding:13px 16px; border-radius:11px; border:1px solid var(--border);
  background:var(--bg-card); color:var(--text); font-size:14.5px; margin-bottom:18px;
}
.gloss-search:focus{outline:none; border-color:var(--purple);}
table.gloss{width:100%; border-collapse:collapse; font-size:13.6px;}
table.gloss th{background:var(--bg3); padding:10px 13px; text-align:left; font-size:11.5px; text-transform:uppercase; color:var(--text-dim); position:sticky; top:0;}
table.gloss td{padding:10px 13px; border-bottom:1px solid var(--border); color:var(--text-dim); vertical-align:top;}
table.gloss td.term{color:var(--sky); font-weight:700; white-space:nowrap;}
table.gloss tr.hidden{display:none;}

/* ============ CHECKLIST ============ */
.cl-summary{
  display:flex; align-items:center; justify-content:space-between; background:var(--bg-card);
  border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; margin-bottom:20px;
}
.cl-count{font-size:24px; font-weight:800; color:var(--teal);}
.cl-count span{font-size:14px; color:var(--text-faint); font-weight:500;}
.cl-group{margin-bottom:8px;}
.cl-group-title{font-size:13px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.4px; margin:22px 0 8px;}
.cl-item{
  display:flex; align-items:flex-start; gap:11px; padding:10px 12px; border-radius:9px;
  cursor:pointer; transition:background 0.15s;
}
.cl-item:hover{background:var(--bg-card);}
.cl-box{
  width:20px; height:20px; border-radius:6px; border:1.5px solid var(--border-light); flex-shrink:0;
  margin-top:1px; display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.cl-item.checked .cl-box{background:var(--teal); border-color:var(--teal);}
.cl-box svg{display:none; width:13px; height:13px;}
.cl-item.checked .cl-box svg{display:block;}
.cl-text{font-size:14px; color:var(--text-dim); transition:all 0.15s;}
.cl-item.checked .cl-text{color:var(--text-faint); text-decoration:line-through;}

/* ============ HOME / LANDING ============ */
.home-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px; margin-top:24px;}
.home-card{
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px;
  cursor:pointer; transition:all 0.15s;
}
.home-card:hover{border-color:var(--purple); transform:translateY(-2px); box-shadow:var(--shadow);}
.home-card .hc-num{font-size:11px; color:var(--purple); font-weight:800;}
.home-card .hc-title{font-size:15px; font-weight:700; color:var(--text); margin:6px 0 4px;}
.home-card .hc-desc{font-size:12.5px; color:var(--text-faint); line-height:1.45;}
.stat-row{display:flex; gap:14px; margin-top:20px; flex-wrap:wrap;}
.stat-box{background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 22px; flex:1; min-width:130px; text-align:center;}
.stat-box .stat-n{font-size:26px; font-weight:800; color:var(--teal);}
.stat-box .stat-l{font-size:11.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.4px; margin-top:3px;}

@media(max-width:880px){
  #sidebar{position:fixed; left:0; top:52px; height:calc(100vh - 52px); transform:translateX(-100%); width:280px; box-shadow:0 0 40px rgba(0,0,0,0.6);}
  #sidebar.open{transform:translateX(0);}
  #sb-toggle{display:flex;}
  #sb-overlay.open{display:block;}
  #main{padding:70px 16px 70px;}
  .bc-label{width:90px; font-size:11px;}
  .fc-stage{height:300px;}
}
</style>

<script>
/* ============================================================
   DM4ML STUDY TOOL — APP LOGIC
   ============================================================ */
const STORAGE_KEYS = {
  visited: 'dm4ml_visited_pages',
  checklist: 'dm4ml_checklist',
  quizHistory: 'dm4ml_quiz_history',
  fcRatings: 'dm4ml_fc_ratings'
};

let state = {
  mode: 'study',
  currentPage: 'home',
  visited: JSON.parse(localStorage.getItem(STORAGE_KEYS.visited) || '{}'),
};

function saveVisited(){ localStorage.setItem(STORAGE_KEYS.visited, JSON.stringify(state.visited)); }

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sb-overlay').classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sb-overlay').classList.remove('open'); }

</script>
<script>
/* ============================================================
   NAVIGATION STRUCTURE
   ============================================================ */
const NAV = [
  {id:'home', label:'Overview', icon:'🏠', group:null},
  {id:'s1', label:'1 · Intro & Data Representations', icon:'', group:'Foundations'},
  {id:'s2', label:'2 · Principles of Data', icon:'', group:'Foundations'},
  {id:'s3', label:'3 · Data Architectures', icon:'', group:'Foundations'},
  {id:'s4', label:'4 · Data Pipelines (ETL/ELT)', icon:'', group:'Pipelines'},
  {id:'s5', label:'5 · Modern Data Stack & DataOps', icon:'', group:'Pipelines'},
  {id:'s6', label:'6 · ML Lifecycle & Workflow', icon:'', group:'Pipelines'},
  {id:'s7', label:'7 · Data Collection & Ingestion', icon:'', group:'Quality'},
  {id:'s8', label:'8 · Profiling & Validation', icon:'', group:'Quality'},
  {id:'lab1', label:'Lab · AWS Athena + Glue + IAM', icon:'', group:'Hands-On Labs'},
  {id:'lab2', label:'Lab · BigQuery + Airbyte + dbt', icon:'', group:'Hands-On Labs'},
  {id:'glossary', label:'Glossary', icon:'📖', group:null},
  {id:'checklist', label:'Revision Checklist', icon:'✅', group:null},
];

function renderNav(){
  const scroll = document.getElementById('nav-scroll');
  let html = '';
  let lastGroup = '__init__';
  NAV.forEach((item, idx) => {
    if(item.group !== lastGroup){
      if(item.group) html += `<div class="nav-section-label">${item.group}</div>`;
      lastGroup = item.group;
    }
    const isActive = state.currentPage === item.id;
    const isVisited = state.visited[item.id];
    const isTopic = item.id.match(/^s\d/) || item.id.startsWith('lab');
    html += `<div class="nav-item ${isActive?'active':''} ${isVisited?'visited':''}" onclick="goTo('${item.id}')">
      ${isTopic ? `<div class="num">${isVisited && !isActive ? '✓' : item.id.replace(/[^0-9]/g,'')||'•'}</div>` : `<div class="num">${item.icon||'•'}</div>`}
      <div class="label">${item.label}</div>
    </div>`;
  });
  scroll.innerHTML = html;
  updateProgress();
}

function updateProgress(){
  const topicIds = NAV.filter(n => n.id.match(/^s\d/) || n.id.startsWith('lab')).map(n=>n.id);
  const visitedCount = topicIds.filter(id => state.visited[id]).length;
  const pct = Math.round((visitedCount/topicIds.length)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-pct').textContent = pct+'%';
}

function goTo(pageId){
  state.currentPage = pageId;
  state.visited[pageId] = true;
  saveVisited();
  closeSidebar();
  renderNav();
  render();
  window.scrollTo(0,0);
}

function setMode(mode){
  state.mode = mode;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===mode));
  if(mode==='quiz'){ state.currentPage='__quiz__'; }
  else if(mode==='flash'){ state.currentPage='__flash__'; }
  else { state.currentPage = (state.currentPage==='__quiz__'||state.currentPage==='__flash__') ? 'home' : state.currentPage; }
  renderNav();
  render();
  window.scrollTo(0,0);
}

/* ============================================================
   RENDER ENGINE — dispatches to mode-specific renderers
   ============================================================ */
function render(){
  const c = document.getElementById('content');
  if(state.mode === 'quiz'){ c.innerHTML = renderQuiz(); initQuiz(); return; }
  if(state.mode === 'flash'){ c.innerHTML = renderFlash(); initFlash(); return; }
  // study mode
  if(state.currentPage === 'home') { c.innerHTML = renderHome(); return; }
  if(state.currentPage === 'glossary'){ c.innerHTML = renderGlossary(); initGlossary(); return; }
  if(state.currentPage === 'checklist'){ c.innerHTML = renderChecklist(); initChecklist(); return; }
  const page = PAGES[state.currentPage];
  if(page){ c.innerHTML = page(); initInteractive(); }
}

/* Re-init expandable cards / vtabs after innerHTML injection */
function initInteractive(){
  document.querySelectorAll('.exp-head').forEach(h=>{
    h.onclick = () => h.parentElement.classList.toggle('open');
  });
  document.querySelectorAll('.barchart .bc-fill').forEach(f=>{
    const w = f.getAttribute('data-width');
    setTimeout(()=>{ f.style.width = w+'%'; }, 80);
  });
}
function showTab(groupId, idx){
  document.querySelectorAll(`.vtabs-${groupId} .vtab-btn`).forEach((b,i)=>b.classList.toggle('active', i===idx));
  document.querySelectorAll(`.vtabs-${groupId} .vtab-panel`).forEach((p,i)=>p.classList.toggle('active', i===idx));
}

function pageNav(prevId, nextId){
  const prev = NAV.find(n=>n.id===prevId);
  const next = NAV.find(n=>n.id===nextId);
  return `<div class="page-nav">
    ${prev ? `<div class="pn-btn" onclick="goTo('${prevId}')"><div class="pn-dir">← Previous</div><div class="pn-name">${prev.label}</div></div>` : '<div class="pn-spacer"></div>'}
    ${next ? `<div class="pn-btn pn-next" onclick="goTo('${nextId}')"><div class="pn-dir">Next →</div><div class="pn-name">${next.label}</div></div>` : ''}
  </div>`;
}

/* ============================================================
   HOME PAGE
   ============================================================ */
function renderHome(){
  return `
  <div class="page-header">
    <div class="page-eyebrow">Data Management for Machine Learning</div>
    <h1 class="page-title">AIMLCZG529 / DSECLZG529 Study Tool</h1>
    <p class="page-desc">Built from your two lecture webinars (AWS Athena/Glue/IAM lab, and the BigQuery/Airbyte/dbt/Looker Studio modern-stack demo) plus the full 8-session course syllabus, enriched with 2025–2026 industry research, benchmarks, and exam-style practice.</p>
  </div>

  <div class="stat-row">
    <div class="stat-box"><div class="stat-n">8</div><div class="stat-l">Core Sessions</div></div>
    <div class="stat-box"><div class="stat-n">2</div><div class="stat-l">Hands-On Labs</div></div>
    <div class="stat-box"><div class="stat-n">30</div><div class="stat-l">Quiz Questions</div></div>
    <div class="stat-box"><div class="stat-n">36</div><div class="stat-l">Flashcards</div></div>
  </div>

  <h2 class="sec-title">📚 Core Sessions</h2>
  <div class="home-grid">
    <div class="home-card" onclick="goTo('s1')"><div class="hc-num">SESSION 1</div><div class="hc-title">Intro & Data Representations</div><div class="hc-desc">DIKW hierarchy, structured/semi/unstructured data, where ML sits in the pipeline.</div></div>
    <div class="home-card" onclick="goTo('s2')"><div class="hc-num">SESSION 2</div><div class="hc-title">Principles of Data</div><div class="hc-desc">Data as asset vs liability, reliability, training-serving skew.</div></div>
    <div class="home-card" onclick="goTo('s3')"><div class="hc-num">SESSION 3</div><div class="hc-title">Data Architectures</div><div class="hc-desc">Centralized/decentralized/hybrid, OLTP vs OLAP, warehouse/lake/lakehouse.</div></div>
    <div class="home-card" onclick="goTo('s4')"><div class="hc-num">SESSION 4</div><div class="hc-title">Data Pipelines</div><div class="hc-desc">Batch vs streaming, ETL vs ELT, CDC, idempotency.</div></div>
    <div class="home-card" onclick="goTo('s5')"><div class="hc-num">SESSION 5</div><div class="hc-title">Modern Data Stack & DataOps</div><div class="hc-desc">Ingestion→storage→transform→orchestration→serving; DataOps pillars.</div></div>
    <div class="home-card" onclick="goTo('s6')"><div class="hc-num">SESSION 6</div><div class="hc-title">ML Lifecycle & Workflow</div><div class="hc-desc">Data/Model/Code, the ML loop, data drift vs concept drift.</div></div>
    <div class="home-card" onclick="goTo('s7')"><div class="hc-num">SESSION 7</div><div class="hc-title">Data Collection & Ingestion</div><div class="hc-desc">Source categorization, push/pull, 1st/2nd/3rd-party data.</div></div>
    <div class="home-card" onclick="goTo('s8')"><div class="hc-num">SESSION 8</div><div class="hc-title">Profiling & Validation</div><div class="hc-desc">Data quality dimensions, profiling vs validation, completeness math.</div></div>
  </div>

  <h2 class="sec-title">🧪 Hands-On Labs (from your webinars)</h2>
  <div class="home-grid">
    <div class="home-card" onclick="goTo('lab1')"><div class="hc-num">LAB · WEBINAR 1</div><div class="hc-title">AWS Athena + Glue + IAM</div><div class="hc-desc">Serverless querying, partitioning for cost/performance, views, CloudFormation named queries, IAM access.</div></div>
    <div class="home-card" onclick="goTo('lab2')"><div class="hc-num">LAB · WEBINAR 2</div><div class="hc-title">BigQuery + Airbyte + dbt + Looker Studio</div><div class="hc-desc">Full ELT stack demo: ingestion, warehouse, transformation, BI visualization.</div></div>
  </div>

  <h2 class="sec-title">🛠 Reference</h2>
  <div class="home-grid">
    <div class="home-card" onclick="goTo('glossary')"><div class="hc-num">REFERENCE</div><div class="hc-title">Glossary</div><div class="hc-desc">Searchable table of every abbreviation and term used across both webinars and the syllabus.</div></div>
    <div class="home-card" onclick="goTo('checklist')"><div class="hc-num">REFERENCE</div><div class="hc-title">Revision Checklist</div><div class="hc-desc">Tick off every examinable concept. Saved automatically in your browser.</div></div>
  </div>

  <div class="callout co-tip" style="margin-top:32px;">
    <div class="co-label">⏰ Exam Tip</div>
    <p>Your exams are <strong>June 20 (Data Management for ML)</strong> and June 21 (Deep RL). The practice worksheet questions map almost 1:1 onto the 8 sessions here — work through Quiz Mode first to find weak spots, then drill those sessions in Study Mode.</p>
  </div>
  `;
}


/* ============================================================
   STUDY PAGES — SESSIONS 1–4
   ============================================================ */
const PAGES = {};

PAGES.s1 = () => `
  <div class="page-header">
    <div class="page-eyebrow">Session 1</div>
    <h1 class="page-title">Introduction & Data Representations</h1>
    <p class="page-desc">What data management actually is, the DIKW hierarchy, the three data shapes you'll meet everywhere, and where ML actually sits in a much longer pipeline.</p>
  </div>

  <h2 class="sec-title">🧱 What is Data Management?</h2>
  <div class="callout co-def">
    <div class="co-label">Definition</div>
    <p><strong>Data management</strong> is the discipline of acquiring, storing, organizing, governing, and serving trustworthy data so that downstream consumers — including ML models — can rely on it.</p>
  </div>
  <div class="callout co-insight">
    <div class="co-label">Insight</div>
    <p>Most ML failures are <strong>data failures</strong>, not model failures. A state-of-the-art architecture trained on bad, undocumented, or unavailable data will fail in production regardless of how clever the modeling is.</p>
  </div>
  <div class="callout co-research">
    <div class="co-label">🔎 Research Addition</div>
    <p>Industry surveys consistently find that data scientists spend 60–80% of project time on data preparation and cleaning rather than modeling — the "data work is the real work" problem that data management as a discipline exists to reduce.</p>
    <span class="source-tag">Source: industry practitioner surveys, 2024–2025</span>
  </div>

  <h2 class="sec-title">📈 The DIKW Hierarchy</h2>
  <p>Each layer adds <em>meaning</em> and <em>value</em> to the layer below it.</p>
  <div class="flow">
    <div class="flow-step acc-sky">Data<br><span style="font-size:11px;opacity:0.8">37.2</span></div>
    <div class="flow-arrow">→</div>
    <div class="flow-step acc-teal">Information<br><span style="font-size:11px;opacity:0.8">37.2°C in Mumbai</span></div>
    <div class="flow-arrow">→</div>
    <div class="flow-step acc-amber">Knowledge<br><span style="font-size:11px;opacity:0.8">Unusually hot</span></div>
    <div class="flow-arrow">→</div>
    <div class="flow-step acc-purple">Wisdom<br><span style="font-size:11px;opacity:0.8">Issue heat advisory</span></div>
  </div>
  <div class="exp-card">
    <div class="exp-head"><div class="title">Why does DIKW matter for ML specifically?</div><div class="chev">▶</div></div>
    <div class="exp-body"><div class="exp-body-inner">
      <p>ML models typically operate at the boundary between <strong>Information</strong> and <strong>Knowledge</strong> — they take structured/processed data and surface patterns a human would call "knowledge" (e.g., "this transaction is unusually likely to be fraud"). The "Wisdom" layer — deciding what action to take — is usually left to a human or a downstream business rule, which is why ML systems are described as decision-<em>support</em>, not full decision-<em>making</em>, in most regulated industries.</p>
    </div></div>
  </div>

  <h2 class="sec-title">🗂 Structured vs Semi-Structured vs Unstructured Data</h2>
  <div class="tbl-wrap">
    <table class="cmp">
      <tr><th>Type</th><th>Definition</th><th>Examples</th><th>Typical Store</th></tr>
      <tr><td class="hl-purple">Structured</td><td>Fixed rows/columns, enforced schema</td><td>Sales tables, transaction logs</td><td>SQL databases (Postgres, MySQL)</td></tr>
      <tr><td class="hl-teal">Semi-structured</td><td>Self-describing tags/keys, flexible schema</td><td>JSON, XML, application logs</td><td>Document stores, data lakes</td></tr>
      <tr><td>Unstructured</td><td>No fixed schema at all</td><td>Text, images, audio, video</td><td>Object storage (S3), data lakes</td></tr>
    </table>
  </div>
  <div class="callout co-tip">
    <div class="co-label">Exam Tip</div>

  <h2 class="sec-title">📏 The Eight Dimensions of Data Quality</h2>
  <div class="flow">

    <div class="flow-step acc-amber">Consistency</div>
    <div class="flow-step acc-sky">Timeliness</div>
  </div>

    <div class="flow-step">Validity</div>
    <div class="flow-step">Uniqueness</div>
    <div class="flow-step">Integrity</div>

  <p>The lecture ran a live, measured comparison of querying the <strong>same logical data</strong> three different ways:</p>

    <p>The instructor's live numbers are not a fluke — they match documented AWS guidance precisely. AWS's own Athena cost-optimization documentation states that for time-partitioned data, a query filtering to one day out of a year-long 10 TB dataset scans roughly 10TB/365 ≈ 27 GB instead of the full 10 TB — a <strong>99.7% reduction</strong>. Because Athena bills <strong>$5 per TB scanned</strong>, partitioning is simultaneously a performance fix and a direct cost-control lever.</p>

    <p>The lecture didn't cover it, but the two complementary techniques real teams layer on top of partitioning are: <strong>columnar formats</strong> (converting CSV to Parquet/ORC, since Athena only reads the columns a query actually needs instead of every column in every row) and <strong>bucketing</strong> (sub-dividing a partition by hash of a high-cardinality column like a customer ID). Documented case studies show columnar conversion alone cutting an 8 GB CSV's query cost by ~85%, and bucketing cutting cost by up to 97% on high-cardinality lookups.</p>

  <div class="flow">
    <div class="flow-step acc-sky">Policy<br><span style="font-size:11px;opacity:0.8">permissions</span></div><div class="flow-arrow">→</div>
    <div class="flow-step acc-teal">Role / Group<br><span style="font-size:11px;opacity:0.8">e.g. "Data Science"</span></div><div class="flow-arrow">→</div>
    <div class="flow-step acc-purple">User<br><span style="font-size:11px;opacity:0.8">Mary, Paolo</span></div>
  </div>
  <h3 class="sub-title">The end-to-end access grant the lecture demonstrated</h3>
  <ol class="plain">

  <div class="callout co-research">

function renderQuiz(){
  if(!window.quizState) initQuizState();
  const qs = window.quizState;
  if(qs.finished) return renderQuizScore();
  const q = QUIZ[qs.idx];
  const dots = QUIZ.map((_,i)=>{
    let cls='qdot';
    if(qs.history[i]===true) cls+=' correct';
    else if(qs.history[i]===false) cls+=' wrong';
    if(i===qs.idx) cls+=' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  const answered = qs.answers[qs.idx] !== undefined;
  const optsHtml = q.options.map((opt,i)=>{
    let cls='q-opt';
    if(answered){
      cls+=' disabled';
      if(i===q.correct) cls+=' correct';
      else if(i===qs.answers[qs.idx]) cls+=' wrong';
      else cls+=' dim';
    }
    return `<div class="${cls}" onclick="${answered?'':`answerQuiz(${i})`}">
      <div class="opt-letter">${String.fromCharCode(65+i)}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');

  return `
  <div class="quiz-wrap">
    <div class="page-header" style="margin-bottom:14px;">
      <div class="page-eyebrow">Quiz Mode</div>
      <h1 class="page-title" style="font-size:22px;">Test Your Knowledge</h1>
    </div>
    <div class="quiz-top">
      <div class="dot-tracker">${dots}</div>
      <div style="font-size:12.5px;color:var(--text-faint);font-weight:600;">${qs.idx+1} / ${QUIZ.length}</div>
    </div>
    <div class="quiz-card">
      <div class="q-meta"><span>${q.session}</span><span>${answered ? (qs.answers[qs.idx]===q.correct?'✓ Correct':'✗ Incorrect') : 'Choose an answer'}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts">${optsHtml}</div>
      <div class="q-explain ${answered?'show':''}">${q.explain}</div>
      <div class="q-footer">
        <div class="btn btn-sm" onclick="prevQuiz()" style="${qs.idx===0?'visibility:hidden':''}">← Back</div>
        <div class="btn btn-sm btn-primary" onclick="nextQuiz()" style="${answered?'':'visibility:hidden'}">${qs.idx===QUIZ.length-1?'See Score':'Next →'}</div>
      </div>
    </div>
  </div>`;
}

function renderQuizScore(){
  const qs = window.quizState;
  const correct = Object.values(qs.history).filter(v=>v===true).length;
  const pct = Math.round((correct/QUIZ.length)*100);
  let msg, emoji;
  if(pct>=90){msg='Outstanding — you clearly know this material cold.'; emoji='🏆';}
  else if(pct>=75){msg='Strong work. Review the few you missed and you\'re exam-ready.'; emoji='💪';}
  else if(pct>=50){msg='Solid foundation, but go back through the missed sessions in Study Mode.'; emoji='📘';}
  else {msg='This is a good diagnostic — head back to Study Mode and work through each session before retrying.'; emoji='🔁';}

  return `
  <div class="quiz-wrap">
    <div class="quiz-card score-screen">
      <div style="font-size:38px;">${emoji}</div>
      <div class="score-num">${pct}%</div>
      <div class="score-label">${correct} / ${QUIZ.length} correct</div>
      <div class="score-msg">${msg}</div>
      <div class="btn-row" style="justify-content:center;">
        <div class="btn btn-primary" onclick="restartQuiz()">Retake Quiz</div>
        <div class="btn" onclick="goTo('home')">Back to Overview</div>
      </div>
    </div>
  </div>`;
}

function initQuizState(){
  window.quizState = {idx:0, answers:{}, history:{}, finished:false};
}
function initQuiz(){ /* no-op, state persists in window.quizState */ }

function answerQuiz(i){
  const qs = window.quizState;
  qs.answers[qs.idx] = i;
  qs.history[qs.idx] = (i === QUIZ[qs.idx].correct);
  render();
}
function nextQuiz(){
  const qs = window.quizState;
  if(qs.idx < QUIZ.length-1){ qs.idx++; }
  else { qs.finished = true; }
  render();
}
function prevQuiz(){
  const qs = window.quizState;
  if(qs.idx>0){ qs.idx--; render(); }
}
function restartQuiz(){ initQuizState(); render(); }

    <div class="fc-nav">
      <div class="btn btn-sm" onclick="navFc(-1)">← Prev</div>
      <div class="btn btn-sm btn-primary" onclick="navFc(1)">Next →</div>
    </div>
    <div class="fc-counters">
      <span>Hard: <b>${ratingCounts.hard}</b></span>
      <span>Good: <b>${ratingCounts.good}</b></span>
      <span>Easy: <b>${ratingCounts.easy}</b></span>
    </div>
  </div>`;
}

function initFcState(){
  const saved = JSON.parse(localStorage.getItem('dm4ml_fc_ratings')||'null');
  window.fcState = {
    deck:'All', idx:0, flipped:false,
    ratings: saved || {hard:0, good:0, easy:0}
  };
}
function initFlash(){}
function flipCard(){ window.fcState.flipped = !window.fcState.flipped; render(); }
function setFcDeck(d){ window.fcState.deck=d; window.fcState.idx=0; window.fcState.flipped=false; render(); }
function navFc(dir){
  const fs = window.fcState;
  const deckCards = fs.deck==='All' ? FLASHCARDS : FLASHCARDS.filter(c=>c.deck===fs.deck);
  fs.idx = (fs.idx + dir + deckCards.length) % deckCards.length;
  fs.flipped = false;
  render();
}
function rateFc(rating){
  window.fcState.ratings[rating]++;
  localStorage.setItem('dm4ml_fc_ratings', JSON.stringify(window.fcState.ratings));
  navFc(1);
}


/* ============================================================

const GLOSSARY = [
  {term:'DIKW', full:'Data, Information, Knowledge, Wisdom', def:'A hierarchy showing how raw data gains meaning as it\'s contextualized, interpreted, and acted upon.', usage:'Used to explain how a number (37.2) becomes a heat advisory.'},
  {term:'OLTP', full:'Online Transaction Processing', def:'Systems optimized for small, frequent reads/writes that run the live business.', usage:'Never run heavy analytics directly against an OLTP production database.'},
  {term:'OLAP', full:'Online Analytical Processing', def:'Systems optimized for large scans and aggregations over historical data, for analytics.', usage:'Data warehouses (Snowflake, BigQuery) are OLAP systems.'},
  {term:'ETL', full:'Extract, Transform, Load', def:'Data integration pattern where transformation happens before loading into the target store.', usage:'Traditional warehouse loading pattern; less ML-friendly than ELT.'},
  {term:'ELT', full:'Extract, Load, Transform', def:'Data integration pattern where raw data loads first, transformation happens afterward inside the destination.', usage:'Used by both webinars — Airbyte/dbt and Glue/Athena both follow this pattern.'},
  {term:'CDC', full:'Change Data Capture', def:'Technique that captures only changed rows from a source\'s transaction log instead of re-copying full tables.', usage:'Underpins near-real-time sync tools like Debezium, Fivetran.'},
  {term:'DAG', full:'Directed Acyclic Graph', def:'A graph of tasks with dependencies and no cycles, used to represent a pipeline\'s execution order.', usage:'Orchestrators like Airflow run pipelines defined as DAGs.'},
  {term:'IAM', full:'Identity and Access Management', def:'AWS service for managing users, groups, roles, and the policies (permissions) attached to them.', usage:'Used in Lab 1 to scope Mary\'s access to a single named Athena query.'},
  {term:'CFN', full:'CloudFormation', def:'AWS\'s infrastructure-as-code service; templates define and provision resources as a "stack."', usage:'Used in Lab 1 to save an Athena query as a reusable, deployable named resource.'},
  {term:'ARN', full:'Amazon Resource Name', def:'A unique identifier for any AWS resource (e.g., a CloudFormation stack, an IAM user).', usage:'The lab noted Mary\'s ARN when inspecting her IAM credentials.'},
  {term:'S3', full:'Simple Storage Service', def:'AWS\'s object storage service; commonly used as the raw layer of a data lake.', usage:'Held the raw NYC taxi CSV data queried throughout Lab 1.'},
  {term:'Glue', full:'AWS Glue', def:'AWS\'s managed data catalog and ETL service; creates metadata tables over data in S3 without duplicating it.', usage:'Created the "taxi_data" database/catalog queried by Athena in Lab 1.'},
  {term:'Athena', full:'Amazon Athena', def:'AWS\'s serverless, interactive SQL query service for analyzing data directly in S3.', usage:'Ran all the partitioning/view/query-optimization demos in Lab 1.'},
  {term:'BigQuery', full:'Google BigQuery', def:'Google Cloud\'s serverless, fully-managed data warehouse.', usage:'Acted as both the raw storage layer and (optionally) transformation engine in Lab 2.'},
  {term:'dbt', full:'data build tool', def:'A transformation framework that lets teams write modular SQL models (version-controlled, testable) that run inside the warehouse.', usage:'Built the staging and churn-summary models in Lab 2, on top of raw data already loaded by Airbyte.'},
  {term:'Airbyte', full:'Airbyte', def:'An open-source data integration (EL) platform connecting hundreds of sources to destinations like BigQuery, Snowflake, etc.', usage:'Performed the Extract+Load step from a CSV in Google Cloud Storage into BigQuery in Lab 2.'},
  {term:'GCS', full:'Google Cloud Storage', def:'Google Cloud\'s object storage service, analogous to AWS S3.', usage:'Held the source telecom-churn CSV file ingested by Airbyte in Lab 2.'},
  {term:'Looker Studio', full:'Google Looker Studio (formerly Google Data Studio)', def:'Google\'s free BI/dashboarding tool connecting directly to data warehouses like BigQuery.', usage:'Built the manager-facing churn dashboard in Lab 2 — note the product has been renamed more than once.'},
  {term:'MDS', full:'Modern Data Stack', def:'The five-layer architecture: Ingestion → Storage → Transformation → Orchestration → Serving, typically built from specialized best-in-class tools.', usage:'Both lab webinars are concrete, tool-by-tool implementations of the MDS.'},
  {term:'CTAS', full:'Create Table As Select', def:'A SQL pattern that creates a new table directly from the result of a SELECT query — often used to materialize a partitioned or filtered subset.', usage:'Used implicitly in Lab 1 to create the month- and pay-type-partitioned tables.'},
  {term:'PII', full:'Personally Identifiable Information', def:'Any data that can identify a specific individual; subject to heightened privacy/compliance handling.', usage:'A key driver of "data as liability" — PII increases breach risk and compliance burden.'},
  {term:'DPDP Act', full:'Digital Personal Data Protection Act, 2023 (India)', def:'India\'s data protection law requiring data minimization and deletion once purpose is fulfilled.', usage:'Cited as the regulatory mechanism enforcing "don\'t hoard data" in practice.'},
  {term:'PSI', full:'Population Stability Index', def:'A statistical metric measuring how much a feature\'s distribution has shifted between two time periods.', usage:'Used by ML observability tools (Evidently AI, WhyLabs) to automatically detect data drift.'},
  {term:'Data Mesh', full:'Data Mesh', def:'A decentralized data architecture where domain teams own and serve their own data products.', usage:'The "decentralized" option in the centralized/decentralized/hybrid comparison.'},
  {term:'Data Contract', full:'Data Contract', def:'A formal, versioned agreement between a data producer and consumer about schema and semantics.', usage:'A modern (2024–2025) practice to validate-at-ingestion and avoid silent source-schema changes.'},
  {term:'GE', full:'Great Expectations', def:'An open-source Python framework for declaring and enforcing data validation rules ("expectations") as code.', usage:'Cited as the dominant tool for "automated tests on values" in DataOps.'},
  {term:'Feature Store', full:'Feature Store', def:'A system that computes and serves ML features consistently for both training and serving, preventing training-serving skew.', usage:'The tooling-level solution to Session 2\'s training-serving skew problem (e.g., Feast, Tecton).'},
  {term:'Data Swamp', full:'Data Swamp', def:'A data lake without catalogs, schema, ownership, or quality checks — un-findable and untrustworthy.', usage:'The failure mode a lake falls into without governance.'},
  {term:'Lakehouse', full:'Data Lakehouse', def:'An architecture combining a data lake\'s flexible storage with a warehouse\'s transactional/SQL layer (e.g., Delta Lake on Databricks).', usage:'Described as the "modern default for ML" in Session 3.'},
];

function renderGlossary(){
  const rows = GLOSSARY.map(g => `
    <tr data-search="${(g.term+' '+g.full+' '+g.def+' '+g.usage).toLowerCase()}">
      <td class="term">${g.term}</td>
      <td>${g.full}</td>
      <td>${g.def}</td>
      <td style="color:var(--text-faint);font-size:13px;">${g.usage}</td>
    </tr>`).join('');

  return `
  <div class="page-header">
    <div class="page-eyebrow">Reference</div>
    <h1 class="page-title">Glossary</h1>
    <p class="page-desc">Every abbreviation and term from both lecture webinars and the course syllabus, searchable.</p>
  </div>
  <input type="text" class="gloss-search" id="gloss-search" placeholder="Search terms, e.g. 'partition', 'IAM', 'ELT'..." oninput="filterGlossary()">
  <div class="tbl-wrap">
    <table class="gloss" id="gloss-table">
      <thead><tr><th>Term</th><th>Full Form</th><th>Definition</th><th>Usage Note</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  `;
}
function initGlossary(){}
function filterGlossary(){
  const q = document.getElementById('gloss-search').value.toLowerCase().trim();
  document.querySelectorAll('#gloss-table tbody tr').forEach(tr=>{
    const matches = tr.getAttribute('data-search').includes(q);
    tr.classList.toggle('hidden', !matches);
  });
}

<script>
(function () {
  const THEME_KEY = "study-hub-theme";
  const root = document.documentElement;
  const toggle = document.getElementById("hubThemeToggle");
  const toggleText = document.getElementById("hubThemeToggleText");

  const saved = localStorage.getItem(THEME_KEY);
  if (saved === "light" || saved === "dark") {
    root.setAttribute("data-theme", saved);
  }
  const syncLabel = () => {
    const isLight = root.getAttribute("data-theme") === "light";
    if (toggle) toggle.setAttribute("aria-pressed", String(isLight));
    if (toggleText) toggleText.textContent = isLight ? "Light mode" : "Night mode";
  };
  syncLabel();

  if (toggle) {
    toggle.addEventListener("click", () => {
      const isDark = root.getAttribute("data-theme") !== "light";
      root.setAttribute("data-theme", isDark ? "light" : "dark");
      localStorage.setItem(THEME_KEY, isDark ? "light" : "dark");
      syncLabel();
    });
  }
})();
</script>
